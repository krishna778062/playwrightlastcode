# PR Type Labels
- name: hotfix
  color: 'd73a4a'
  description: 'Production hotfix - merged to main'

- name: feature
  color: '0e8a16'
  description: 'New feature or enhancement'

- name: release
  color: 'fbca04'
  description: 'Release-related change'

- name: bug
  color: 'd93f0b'
