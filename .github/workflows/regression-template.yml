name: Regression Tests (Reusable Template)

on:
  workflow_call:
    inputs:
      environment:
        description: 'Environment to run tests against (test, qa)'
        required: true
        type: string
      git_ref:
        description: 'Git ref to checkout (branch or tag)'
        required: true
        type: string
      slack_prefix:
        description: 'Prefix for Slack messages'
        required: true
        type: string
      is_browserstack:
        description: 'Enable BrowserStack Test Observability'
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write
  pages: write

jobs:
  regression-tests:
    timeout-minutes: 200
    runs-on: [kubernetes]
    strategy:
      fail-fast: false
      matrix:
        # Content modules removed - they have their own workflow (content-regression-test.yml)
        module: [
            chat,
            platforms,
            global-search,
            de,
            de-api,
            de-api-abac,
            reward,
            reward-settings,
            recognition,
            privateRecognition,
            frontline,
            alert-notification,
            employee-listening,
            form-designer,
            comms-planner,
          ] # de is short for data-engineering
    env:
      S3_BUCKET: simpplr-e2e-automation-958465808810-us-west-2
      MODULE_NAME: ${{ matrix.module }}
      TEST_ENV: ${{ inputs.environment }}
      SLACK_WEBHOOK_URL: https://hooks.slack.com/services/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
      # BrowserStack Test Observability
      BUILD_NUMBER: ${{ github.run_number }}
      CI_BRANCH: ${{ github.ref_name }}
      BROWSERSTACK_USERNAME: ${{ secrets.BROWSERSTACK_USERNAME }}
      BROWSERSTACK_ACCESS_KEY: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}
    steps:
      - name: Display configuration
        run: |
          echo "🌍 Environment: ${{ inputs.environment }}"
          echo "🔖 Git Ref: ${{ inputs.git_ref }}"
          echo "📢 Slack Prefix: ${{ inputs.slack_prefix }}"

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.git_ref }}

      - name: set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ghostscript imagemagick graphicsmagick

      - name: Run regression tests
        run: |
          # Set TLS config for test environments
          export NODE_TLS_REJECT_UNAUTHORIZED=0

          if [ "${{ inputs.is_browserstack }}" = "true" ]; then
            echo "🔬 Running with BrowserStack Test Observability..."
            RUN_CMD="npx browserstack-node-sdk playwright test"
          else
            echo "🧪 Running locally..."
            RUN_CMD="npx playwright test"
          fi

          if [ "${{ matrix.module }}" = "reward" ]; then
            echo "Running Reward tests (excluding P3) with 3 workers..."
            $RUN_CMD --config=src/modules/reward/playwright.reward.config.ts --grep-invert="@rewards-db|P3" --workers=3
          elif [ "${{ matrix.module }}" = "reward-settings" ]; then
            echo "Running Reward Settings tests (excluding P3) with 1 worker..."
            $RUN_CMD --config=src/modules/reward/playwright.reward-settings.config.ts --grep-invert="@rewards-db|P3" --workers=1
          elif [ "${{ matrix.module }}" = "de" ]; then
            echo "Running Data Engineering tests with 3 workers..."
            $RUN_CMD --config=src/modules/data-engineering/playwright.data-engineering.config.ts --workers=3
          elif [ "${{ matrix.module }}" = "de-api" ]; then
            echo "Running Data Engineering API tests with 3 workers..."
            $RUN_CMD --config=src/modules/data-engineering/playwright.data-engineering-api.config.ts --workers=3
          elif [ "${{ matrix.module }}" = "de-api-abac" ]; then
            echo "Running Data Engineering API ABAC tests with 3 workers..."
            $RUN_CMD --config=src/modules/data-engineering/playwright.data-engineering-api-abac.config.ts --workers=3
          elif [ "${{ matrix.module }}" = "content-settings" ]; then
            echo "Running Content Settings tests with 3 workers..."
            $RUN_CMD --config=src/modules/content/playwright.content-settings.config.ts --workers=3
          elif [ "${{ matrix.module }}" = "content-studio" ]; then
            echo "Running Content Studio tests with 3 workers..."
            $RUN_CMD --config=src/modules/content/playwright.content-studio.config.ts --workers=3
          elif [ "${{ matrix.module }}" = "content-abac" ]; then
            echo "Running Content ABAC tests with 3 workers..."
            $RUN_CMD --config=src/modules/content/playwright.content-abac.config.ts --workers=3
          else
            $RUN_CMD --config=src/modules/${{ matrix.module }}/playwright.${{ matrix.module }}.config.ts --workers=3
          fi

      - name: Upload test report to github artifact backup
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report-${{ matrix.module }}-${{ inputs.environment }}
          path: |
            playwright-report
            test-results

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4.1.0
        with:
          aws-access-key-id: ${{ secrets.CICD_USER_AGENT_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.CICD_USER_AGENT_SECRET_ACCESS_KEY }}
          role-to-assume: 'arn:aws:iam::693891728731:role/non-prod-deployer'
          aws-region: 'us-west-2'
          role-skip-session-tagging: true
          role-duration-seconds: 1200

      - name: Set timestamp
        id: timestamp
        run: |
          echo "TIMESTAMP=$(date +"%Y-%m-%d-%H-%M-%S")" >> $GITHUB_ENV
          echo "Timestamp set to: $TIMESTAMP"

      - name: Generate HTML Report
        if: always()
        run: |
          npm run generate-report:custom test-results/test-results.json

      - name: Generate Tag Report
        if: always()
        run: |
          npm run generate-tag-report

      - name: Upload Report to S3 # dummy comemnt to test
        if: always()
        run: |
          echo "Uploading report to S3..."
          aws s3 cp playwright-report s3://${S3_BUCKET}/${MODULE_NAME}/runs/${{ env.TIMESTAMP }}-${{ github.run_id }} --recursive

          echo "Updating latest folder..."
          aws s3 cp playwright-report s3://${S3_BUCKET}/${MODULE_NAME}/latest --recursive

          echo '<!DOCTYPE html>
          <html>
            <head>
              <meta http-equiv="refresh" content="0; url=./latest/index.html">
            </head>
            <body>
              <p>Redirecting to latest report...</p>
            </body>
          </html>' > index.html

          aws s3 cp index.html s3://${S3_BUCKET}/${MODULE_NAME}/index.html

          echo "Report uploaded successfully!"
          echo "📊 Test Report Links:"
          echo "🔗 Latest Report: https://playwrite.simpplr.xyz/results/${MODULE_NAME}/latest/index.html"
          echo "📅 Timestamped Report: https://playwrite.simpplr.xyz/results/${MODULE_NAME}/runs/${{ env.TIMESTAMP }}-${{ github.run_id }}/index.html"
          echo "🏷️ Tag Report: https://playwrite.simpplr.xyz/results/${MODULE_NAME}/latest/tag-report.html"

          echo "LATEST_REPORT_URL=https://playwrite.simpplr.xyz/results/${MODULE_NAME}/latest/index.html" >> $GITHUB_ENV
          echo "TIMESTAMPED_REPORT_URL=https://playwrite.simpplr.xyz/results/${MODULE_NAME}/runs/${{ env.TIMESTAMP }}-${{ github.run_id }}/index.html" >> $GITHUB_ENV
          echo "TAG_REPORT_URL=https://playwrite.simpplr.xyz/results/${MODULE_NAME}/latest/tag-report.html" >> $GITHUB_ENV

      - name: Upload Regression Data to Postgres
        if: always()
        env:
          DB_POOL_MAX: 3
          DB_POOL_MIN: 1
          DB_CONNECTION_TIMEOUT: 10000
          DB_ACQUIRE_TIMEOUT: 60000
          DB_IDLE_TIMEOUT: 15000
          DB_ALLOW_EXIT_ON_IDLE: true
          PG_DB_HOST: ${{secrets.PG_DB_HOST}}
          PG_DB_PORT: ${{secrets.PG_DB_PORT}}
          PG_DB_NAME: ${{secrets.PG_DB_NAME}}
          PG_DB_USER: ${{secrets.PG_DB_USER}}
          PG_DB_PASSWORD: ${{secrets.PG_DB_PASSWORD}}
          TEAM_NAME: core
          MODULE_NAME: ${{ matrix.module }}
          IS_REGRESSION: true
        run: |
          echo "Uploading regression data to postgres..."
          REPORT_PATH=${{ env.TIMESTAMPED_REPORT_URL }} npm run report:postgres
          echo "Regression data uploaded successfully to postgres"

      - name: Parse Test Results
        if: always()
        run: |
          if [ -f "test-results/test-results.json" ]; then
            TOTAL_TESTS=$(jq -r '.stats.expected + .stats.unexpected + .stats.skipped + .stats.flaky' test-results/test-results.json)
            PASSED_TESTS=$(jq -r '.stats.expected' test-results/test-results.json)
            FAILED_TESTS=$(jq -r '.stats.unexpected' test-results/test-results.json)
            SKIPPED_TESTS=$(jq -r '.stats.skipped' test-results/test-results.json)
            FLAKY_TESTS=$(jq -r '.stats.flaky' test-results/test-results.json)

            KNOWN_FAILED=$(node -e "
              const fs = require('fs');
              const data = JSON.parse(fs.readFileSync('test-results/test-results.json', 'utf8'));
              const knownFailed = data.suites.flatMap(s =>
                (s.suites || []).flatMap(ss =>
                  (ss.specs || []).flatMap(sp =>
                    (sp.tests || []).filter(t =>
                      t.status === 'unexpected' &&
                      t.annotations && t.annotations.some(a => a.type === 'known_failure')
                    )
                  )
                )
              ).length;
              console.log(knownFailed);
            ")

            ACTUAL_FAILED=$((FAILED_TESTS - KNOWN_FAILED))
          else
            TOTAL_TESTS=0
            PASSED_TESTS=0
            FAILED_TESTS=0
            SKIPPED_TESTS=0
            FLAKY_TESTS=0
            KNOWN_FAILED=0
            ACTUAL_FAILED=0
          fi

          echo "TOTAL_TESTS=$TOTAL_TESTS" >> $GITHUB_ENV
          echo "PASSED_TESTS=$PASSED_TESTS" >> $GITHUB_ENV
          echo "FAILED_TESTS=$FAILED_TESTS" >> $GITHUB_ENV
          echo "SKIPPED_TESTS=$SKIPPED_TESTS" >> $GITHUB_ENV
          echo "FLAKY_TESTS=$FLAKY_TESTS" >> $GITHUB_ENV
          echo "KNOWN_FAILED=$KNOWN_FAILED" >> $GITHUB_ENV
          echo "ACTUAL_FAILED=$ACTUAL_FAILED" >> $GITHUB_ENV

          echo "Test Results: Total: $TOTAL_TESTS, Passed: $PASSED_TESTS, Failed: $FAILED_TESTS (Actual: $ACTUAL_FAILED, Known: $KNOWN_FAILED), Skipped: $SKIPPED_TESTS, Flaky: $FLAKY_TESTS"

      - name: Send Slack Notification
        if: always()
        run: |
          if [ "${{ env.TOTAL_TESTS }}" -gt 0 ]; then
            if [ "${{ env.KNOWN_FAILED }}" -gt 0 ]; then
              MESSAGE="🧪 *${{ inputs.slack_prefix }}* - \`${{ matrix.module }}\` module on \`${{ inputs.environment }}\` (\`${{ inputs.git_ref }}\`) completed with ${{ env.TOTAL_TESTS }} tests (${{ env.PASSED_TESTS }} ✅ ${{ env.ACTUAL_FAILED }} ❌ ${{ env.SKIPPED_TESTS }} ⏭️ ${{ env.FLAKY_TESTS }} ⚠️) ↪ Known failures: ${{ env.KNOWN_FAILED }} | <${{ env.TIMESTAMPED_REPORT_URL }}|📊 Report> | <${{ env.TAG_REPORT_URL }}|🏷️ Tags> | <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|🔍 Details>"
            else
              MESSAGE="🧪 *${{ inputs.slack_prefix }}* - \`${{ matrix.module }}\` module on \`${{ inputs.environment }}\` (\`${{ inputs.git_ref }}\`) completed with ${{ env.TOTAL_TESTS }} tests (${{ env.PASSED_TESTS }} ✅ ${{ env.ACTUAL_FAILED }} ❌ ${{ env.SKIPPED_TESTS }} ⏭️ ${{ env.FLAKY_TESTS }} ⚠️) | <${{ env.TIMESTAMPED_REPORT_URL }}|📊 Report> | <${{ env.TAG_REPORT_URL }}|🏷️ Tags> | <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|🔍 Details>"
            fi
            curl -X POST -H 'Content-type: application/json' --data "{\"text\":\"$MESSAGE\"}" $SLACK_WEBHOOK_URL
          fi

      - name: Send Smart Slack Notifications
        if: always()
        run: |
          if [ -f "test-results/test-results.json" ]; then
            TOTAL_TESTS=$(jq -r '.stats.expected + .stats.unexpected + .stats.skipped' test-results/test-results.json)
            if [ "$TOTAL_TESTS" -eq 0 ]; then
              NO_TESTS_MESSAGE="⚠️ *${{ inputs.slack_prefix }}: No Tests Found* - \`${{ matrix.module }}\` module on \`${{ inputs.environment }}\` (\`${{ inputs.git_ref }}\`) found no tests. Please check your test filters. | <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|🔍 Details>"
              curl -X POST -H 'Content-type: application/json' --data "{\"text\":\"$NO_TESTS_MESSAGE\"}" $SLACK_WEBHOOK_URL
            fi
          else
            FAILURE_MESSAGE="🚨 *${{ inputs.slack_prefix }} Pipeline Failed* - \`${{ matrix.module }}\` module on \`${{ inputs.environment }}\` (\`${{ inputs.git_ref }}\`) could not execute. Please check job details. | <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|🔍 Details>"
            curl -X POST -H 'Content-type: application/json' --data "{\"text\":\"$FAILURE_MESSAGE\"}" $SLACK_WEBHOOK_URL
          fi
