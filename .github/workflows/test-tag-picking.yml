          if [ -z "$TAG" ]; then
            echo "❌ No UAT tag found"
            echo "tag=release" >> $GITHUB_OUTPUT
          else
            echo "✅ Found UAT tag: $TAG"
            echo "tag=$TAG" >> $GITHUB_OUTPUT
          fi

      - name: Checkout UAT tag
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.uat-tag.outputs.tag }}

      - name: Verify checkout
        run: |
          echo "Currently on: $(git describe --tags --exact-match 2>/dev/null || git rev-parse --abbrev-ref HEAD)"

  test-prod-tag:
    runs-on: [kubernetes]
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest Prod tag
        id: prod-tag
        run: |
          TAG=$(git ls-remote --tags origin | \
                grep -o 'refs/tags/[0-9]*\.[0-9]*\.[0-9]*$' | \
                sort -V | tail -n1 | cut -d'/' -f3)

          if [ -z "$TAG" ]; then
            echo "❌ No Prod tag found"
            echo "tag=main" >> $GITHUB_OUTPUT
          else
            echo "✅ Found Prod tag: $TAG"
            echo "tag=$TAG" >> $GITHUB_OUTPUT
          fi

      - name: Checkout Prod tag
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.prod-tag.outputs.tag }}

      - name: Verify checkout
        run: |
          echo "Currently on: $(git describe --tags --exact-match 2>/dev/null || git rev-parse --abbrev-ref HEAD)"
