name: Test Tag Picking

on:
  workflow_dispatch:

jobs:
  test-qa-tag:
    runs-on: [kubernetes]
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest QA tag
        id: qa-tag
        run: |
          TAG=$(git ls-remote --tags origin | \
                grep -o 'refs/tags/.*-qa\.[0-9]*$' | \
                sort -V | tail -n1 | cut -d'/' -f3)

          if [ -z "$TAG" ]; then
            echo "❌ No QA tag found"
            echo "tag=release" >> $GITHUB_OUTPUT
          else
            echo "✅ Found QA tag: $TAG"
            echo "tag=$TAG" >> $GITHUB_OUTPUT
          fi

      - name: Checkout QA tag
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.qa-tag.outputs.tag }}

      - name: Verify checkout
        run: |
          echo "Currently on: $(git describe --tags --exact-match 2>/dev/null || git rev-parse --abbrev-ref HEAD)"

  test-uat-tag:
    runs-on: [kubernetes]
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
