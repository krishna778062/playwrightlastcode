name: Content Regression Tests

on:
  workflow_dispatch: # allows manual triggering of the workflow
    inputs:
      module_name:
        description: 'Select the content module to test'
        required: true
        default: 'content'
        type: choice
        options:
          - 'content'
          - 'content-settings'
          - 'content-studio'
          - 'content-abac'
      test_category:
        description: 'Select UI or API tests'
        required: true
        default: 'ui'
        type: choice
        options:
          - 'ui'
          - 'api'
      priority_filter:
        description: 'Select test cases by priority'
        required: true
        default: '@P0'
        type: choice
        options:
          - '@P0'
          - '@P1'
          - 'all'
      test_type:
        description: 'Select the type of tests to run'
        required: true
        default: 'all'
        type: choice
        options:
          - '@smoke'
          - '@regression'
          - 'all'
      environment:
        description: 'Select the environment to run tests against'
        required: true
        default: 'qa'
        type: choice
        options:
          - 'test'
          - 'qa'
          - 'uat'
          - 'prodEU'
          - 'prodUS'
          - 'uatEU'
      workers:
        description: 'Number of parallel workers to run tests (default: 5 for content UI, 1 for others)'
        required: true
        default: '1'
        type: choice
        options:
          - '1'
          - '2'
          - '3'
          - '4'
          - '5'
      feature_tags:
        description: 'Comma-separated list of feature tags to include in tests (e.g., @CONT-41913)'
        required: false
        default: 'all'
        type: string
  schedule:
    # Run daily at 3 AM UTC for content regression tests
    - cron: '0 4 * * *'

permissions:
  contents: read
  id-token: write
  pages: write

jobs:
  content-test-and-upload:
    timeout-minutes: 300
    runs-on: [kubernetes]
    env:
      S3_BUCKET: simpplr-e2e-automation-958465808810-us-west-2
      MODULE_NAME: ${{ inputs.module_name || 'content' }}-${{ inputs.test_category || 'ui' }}
      E2E_SLACK_WEBHOOK_URL: https://hooks.slack.com/services/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
      CONTENT_QA_SLACK_WEBHOOK_URL: https://hooks.slack.com/services/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
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Create Calendar Secrets JSON
        run: |
          echo '${{ vars.CALENDAR_SECRETS }}' > githubSecrets.json
          echo "✅ Created githubSecrets.json with Google and Outlook Calendar credentials for CI environment"

      - name: set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ghostscript imagemagick graphicsmagick

      - name: Run Content tests
        id: run-tests
        env:
          TEST_ENV: ${{ inputs.environment || 'qa' }}
        run: |
          PRIORITY="${{ inputs.priority_filter }}"
          TEST_TYPE="${{ inputs.test_type }}"
          FEATURE_TAGS="${{ inputs.feature_tags || '' }}"
          MODULE="${{ inputs.module_name || 'content' }}"
          TEST_CATEGORY="${{ inputs.test_category || 'ui' }}"
          ALL_TAGS=()

          # Add @api tag if API tests are selected
          # This works for any module that has API tests (currently content, but extensible for future modules)
          if [ "$TEST_CATEGORY" = "api" ]; then
            ALL_TAGS+=("@api")
          fi

          # Add priority filter (skip if "all")
          [ "$PRIORITY" != "all" ] && ALL_TAGS+=("$PRIORITY")

          # Add test type filter (skip if "all")
          if [ "$TEST_TYPE" != "all" ]; then
            ALL_TAGS+=("$TEST_TYPE")
          fi

          # Add feature tags (skip if "all")
          if [ "$FEATURE_TAGS" != "all" ] && [ -n "$FEATURE_TAGS" ]; then
            IFS=',' read -ra FEATURES <<< "$FEATURE_TAGS"
            for tag in "${FEATURES[@]}"; do
              [ -n "$tag" ] && ALL_TAGS+=("$tag")
            done
          fi

          echo "Debug: Module=$MODULE, TestCategory=$TEST_CATEGORY, Priority=$PRIORITY, TestType=$TEST_TYPE, FeatureTags=$FEATURE_TAGS"
          echo "Debug: All tags to filter: ${ALL_TAGS[*]}"

          # Set workers - default to 5 for content UI tests, use input value for others
          WORKERS="${{ inputs.workers || '1' }}"
          if [ -z "$WORKERS" ] || [ "$WORKERS" = "" ]; then
            if [ "$MODULE" = "content" ] && [ "$TEST_CATEGORY" = "ui" ]; then
              WORKERS="5"
            else
              WORKERS="1"
            fi
          fi
          # Override to 5 for content UI module if it's the default '1' (user didn't specify)
          if [ "$MODULE" = "content" ] && [ "$TEST_CATEGORY" = "ui" ] && [ "$WORKERS" = "1" ]; then
            WORKERS="5"
          fi

          # Determine config file based on module and test category
          # Generic logic that works for all modules:
          # - {module} + ui -> playwright.{module}.config.ts
          # - {module} + api -> playwright.{module}-api.config.ts
          # Examples:
          #   content + ui -> playwright.content.config.ts
          #   content + api -> playwright.content-api.config.ts
          #   content-abac + ui -> playwright.content-abac.config.ts
          #   content-abac + api -> playwright.content-abac-api.config.ts (if exists in future)
          if [ "$TEST_CATEGORY" = "api" ]; then
            CONFIG_FILE="src/modules/content/playwright.${MODULE}-api.config.ts"
          else
            CONFIG_FILE="src/modules/content/playwright.${MODULE}.config.ts"
          fi

          # Verify config file exists
          if [ ! -f "$CONFIG_FILE" ]; then
            echo "Error: Config file not found: $CONFIG_FILE"
            echo ""
            echo "Module: $MODULE"
            echo "Test Category: $TEST_CATEGORY"
            echo "Expected config: $CONFIG_FILE"
            echo ""
            echo "Available config files:"
            ls -la src/modules/content/playwright.*.config.ts || true
            echo ""
            if [ "$TEST_CATEGORY" = "api" ]; then
              echo "Note: API tests may not be available for module '$MODULE' yet."
              echo "Available test categories for '$MODULE': ui"
            fi
            exit 1
          fi

          echo "Using config file: $CONFIG_FILE"

          if [ ${#ALL_TAGS[@]} -eq 0 ]; then
            echo "Running all tests without filters"
            TEST_ENV=${{ inputs.environment || 'qa' }} MODULE_NAME=content npx playwright test --config="$CONFIG_FILE" --workers="$WORKERS"
          else
            # For multiple tags, use AND logic by joining with .* (matches any characters between tags)
            # This ensures tests match ALL specified tags, not just one
            # Wrap each tag in parentheses for better regex matching: (@tag1).*(@tag2)
            if [ ${#ALL_TAGS[@]} -gt 1 ]; then
              # Join tags with .* for regex AND logic, wrapping each in parentheses
              # Example: (@api).*(@P0) matches tests that have both @api and @P0 tags
              GREP_REGEX=$(printf '(%s).*' "${ALL_TAGS[@]}" | sed 's/\.\*$//')
            else
              GREP_REGEX="${ALL_TAGS[0]}"
            fi
            echo "Running Content tests with grep filter: $GREP_REGEX"
            TEST_ENV=${{ inputs.environment || 'qa' }} MODULE_NAME=content npx playwright test --config="$CONFIG_FILE" --grep="$GREP_REGEX" --workers="$WORKERS"
          fi

      - name: Upload test report to github artifact backup
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: content-test-report
          path: playwright-report

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4.1.0
        with:
          aws-access-key-id: ${{ secrets.CICD_USER_AGENT_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.CICD_USER_AGENT_SECRET_ACCESS_KEY }}
          role-to-assume: 'arn:aws:iam::693891728731:role/non-prod-deployer'
          aws-region: 'us-west-2'
          role-skip-session-tagging: true
          role-duration-seconds: 1200

      - name: Set timestamp
        id: timestamp
        run: |
          echo "TIMESTAMP=$(date +"%Y-%m-%d-%H-%M-%S")" >> $GITHUB_ENV
          echo "Timestamp set to: $TIMESTAMP"

      - name: Generate HTML Report
        if: always()
        run: |
          npm run generate-report:custom test-results/test-results.json

      - name: Generate Tag Report
        if: always()
        run: |
          npm run generate-tag-report

      - name: Upload Report to S3
        if: always()
        run: |
          # Upload to timestamped folder
          echo "Uploading report to S3..."
          aws s3 cp playwright-report s3://${S3_BUCKET}/${MODULE_NAME}/runs/${{ env.TIMESTAMP }}-${{ github.run_id }} --recursive

          # Update latest folder (overwrites existing files)
          echo "Updating latest folder..."
          aws s3 cp playwright-report s3://${S3_BUCKET}/${MODULE_NAME}/latest --recursive

          # Create index.html in module root to redirect to latest
          echo '<!DOCTYPE html>
          <html>
            <head>
              <meta http-equiv="refresh" content="0; url=./latest/index.html">
            </head>
            <body>
              <p>Redirecting to latest report...</p>
            </body>
          </html>' > index.html

          aws s3 cp index.html s3://${S3_BUCKET}/${MODULE_NAME}/index.html

          echo "Report uploaded successfully!"
          echo "Latest report available at: s3://${S3_BUCKET}/${MODULE_NAME}/latest"
          echo "Timestamped report available at: s3://${S3_BUCKET}/${MODULE_NAME}/runs/${{ env.TIMESTAMP }}-${{ github.run_id }}"
          echo ""
          echo "📊 Test Report Links:"
          echo "🔗 Latest Report: https://playwrite.simpplr.xyz/results/${MODULE_NAME}/latest/index.html"
          echo "🏷️ Latest Tag Report: https://playwrite.simpplr.xyz/results/${MODULE_NAME}/latest/tag-report.html"
          echo "📅 Timestamped Report: https://playwrite.simpplr.xyz/results/${MODULE_NAME}/runs/${{ env.TIMESTAMP }}-${{ github.run_id }}/index.html"
          echo "📅 Timestamped Tag Report: https://playwrite.simpplr.xyz/results/${MODULE_NAME}/runs/${{ env.TIMESTAMP }}-${{ github.run_id }}/tag-report.html"

          # Store report links for Slack notification
          echo "LATEST_REPORT_URL=https://playwrite.simpplr.xyz/results/${MODULE_NAME}/latest/index.html" >> $GITHUB_ENV
          echo "LATEST_TAG_REPORT_URL=https://playwrite.simpplr.xyz/results/${MODULE_NAME}/latest/tag-report.html" >> $GITHUB_ENV
          echo "TIMESTAMPED_REPORT_URL=https://playwrite.simpplr.xyz/results/${MODULE_NAME}/runs/${{ env.TIMESTAMP }}-${{ github.run_id }}/index.html" >> $GITHUB_ENV
          echo "TIMESTAMPED_TAG_REPORT_URL=https://playwrite.simpplr.xyz/results/${MODULE_NAME}/runs/${{ env.TIMESTAMP }}-${{ github.run_id }}/tag-report.html" >> $GITHUB_ENV

      - name: Parse Test Results
        if: always()
        run: |
          # Parse test results from test-results directory
          if [ -f "test-results/test-results.json" ]; then
            TOTAL_TESTS=$(jq -r '.stats.expected + .stats.unexpected + .stats.skipped + .stats.flaky' test-results/test-results.json)
            PASSED_TESTS=$(jq -r '.stats.expected' test-results/test-results.json)
            FAILED_TESTS=$(jq -r '.stats.unexpected' test-results/test-results.json)
            SKIPPED_TESTS=$(jq -r '.stats.skipped' test-results/test-results.json)
            FLAKY_TESTS=$(jq -r '.stats.flaky' test-results/test-results.json)

            # Count known failures from annotations
            KNOWN_FAILED=$(node -e "
              const fs = require('fs');
              const data = JSON.parse(fs.readFileSync('test-results/test-results.json', 'utf8'));
              const knownFailed = data.suites.flatMap(s =>
                (s.suites || []).flatMap(ss =>
                  (ss.specs || []).flatMap(sp =>
                    (sp.tests || []).filter(t =>
                      t.status === 'unexpected' &&
                      t.annotations && t.annotations.some(a => a.type === 'known_failure')
                    )
                  )
                )
              ).length;
              console.log(knownFailed);
            ")

            # Calculate actual failures (excluding known failures)
            ACTUAL_FAILED=$((FAILED_TESTS - KNOWN_FAILED))
          else
            TOTAL_TESTS=0
            PASSED_TESTS=0
            FAILED_TESTS=0
            SKIPPED_TESTS=0
            FLAKY_TESTS=0
            KNOWN_FAILED=0
            ACTUAL_FAILED=0
          fi

          echo "TOTAL_TESTS=$TOTAL_TESTS" >> $GITHUB_ENV
          echo "PASSED_TESTS=$PASSED_TESTS" >> $GITHUB_ENV
          echo "FAILED_TESTS=$FAILED_TESTS" >> $GITHUB_ENV
          echo "SKIPPED_TESTS=$SKIPPED_TESTS" >> $GITHUB_ENV
          echo "FLAKY_TESTS=$FLAKY_TESTS" >> $GITHUB_ENV
          echo "KNOWN_FAILED=$KNOWN_FAILED" >> $GITHUB_ENV
          echo "ACTUAL_FAILED=$ACTUAL_FAILED" >> $GITHUB_ENV

          echo "Test Results:"
          echo "Total: $TOTAL_TESTS, Passed: $PASSED_TESTS, Failed: $FAILED_TESTS (Actual: $ACTUAL_FAILED, Known: $KNOWN_FAILED), Skipped: $SKIPPED_TESTS, Flaky: $FLAKY_TESTS"

      - name: Send Slack Notification
        if: always()
        run: |
          WEBHOOKS=(" $E2E_SLACK_WEBHOOK_URL " " $CONTENT_QA_SLACK_WEBHOOK_URL ")
          # Only send notification if tests actually ran (TOTAL_TESTS > 0)
          if [ "${{ env.TOTAL_TESTS }}" -gt 0 ]; then
            # Prepare Slack message with hyperlinks
            BRANCH_NAME="${{ github.ref_name || github.ref || 'unknown' }}"
            ENVIRONMENT="${{ inputs.environment || 'qa' }}"
            MODULE_NAME="${{ inputs.module_name || 'content' }}-${{ inputs.test_category || 'ui' }}"
            if [ "${{ env.KNOWN_FAILED }}" -gt 0 ]; then
              MESSAGE="<!subteam^S087M3C16GL>  📝 *Content Regression Automation Suite* - \`${MODULE_NAME}\` module triggered by \`${{ github.actor }}\` from \`${BRANCH_NAME}\` branch on \`${ENVIRONMENT}\` environment concluded with ${{ env.TOTAL_TESTS }} tests (${{ env.PASSED_TESTS }} ✅ ${{ env.ACTUAL_FAILED }} ❌ ${{ env.SKIPPED_TESTS }} ⏭️ ${{ env.FLAKY_TESTS }} ⚠️) ↪ Known failures (linked): ${{ env.KNOWN_FAILED }} | <${{ env.TIMESTAMPED_REPORT_URL }}|📊 View Report> | <${{ env.TIMESTAMPED_TAG_REPORT_URL }}|🏷️ Tag Report> | <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|🔍 Job Details>"
            else
              MESSAGE="<!subteam^S087M3C16GL>  📝 *Content Regression Automation Suite* - \`${MODULE_NAME}\` module triggered by \`${{ github.actor }}\` from \`${BRANCH_NAME}\` branch on \`${ENVIRONMENT}\` environment concluded with ${{ env.TOTAL_TESTS }} tests (${{ env.PASSED_TESTS }} ✅ ${{ env.ACTUAL_FAILED }} ❌ ${{ env.SKIPPED_TESTS }} ⏭️ ${{ env.FLAKY_TESTS }} ⚠️) | <${{ env.TIMESTAMPED_REPORT_URL }}|📊 View Report> | <${{ env.TIMESTAMPED_TAG_REPORT_URL }}|🏷️ Tag Report> | <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|🔍 Job Details>"
            fi

            # Send to Slack using curl
            for WEBHOOK in "${WEBHOOKS[@]}"; do
              curl -X POST -H 'Content-type: application/json' \
                --data "{\"text\":\"$MESSAGE\"}" \
                $WEBHOOK
            done
          else
            echo "No tests ran, skipping success notification"
          fi

      - name: Send Smart Slack Notifications
        if: always()
        run: |
          WEBHOOKS=(" $E2E_SLACK_WEBHOOK_URL " " $CONTENT_QA_SLACK_WEBHOOK_URL ")
           # Check if tests were executed
           if [ -f "test-results/test-results.json" ]; then
             TOTAL_TESTS=$(jq -r '.stats.expected + .stats.unexpected + .stats.skipped + .stats.flaky' test-results/test-results.json)

             if [ "$TOTAL_TESTS" -eq 0 ]; then
               # No tests found
               echo "No tests were found matching the criteria"
               BRANCH_NAME="${{ github.ref_name || github.ref || 'unknown' }}"
               ENVIRONMENT="${{ inputs.environment || 'qa' }}"
               MODULE_NAME="${{ inputs.module_name || 'content' }}-${{ inputs.test_category || 'ui' }}"
               NO_TESTS_MESSAGE="⚠️ *No Content Tests Found* - \`${MODULE_NAME}\` module triggered by \`${{ github.actor }}\` from \`${BRANCH_NAME}\` branch on \`${ENVIRONMENT}\` environment found no tests matching the criteria. Please check your test filters. | <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|🔍 Job Details>"

              # Send to Slack using curl
              for WEBHOOK in "${WEBHOOKS[@]}"; do
               curl -X POST -H 'Content-type: application/json' \
                 --data "{\"text\":\"$NO_TESTS_MESSAGE\"}" \
                 $WEBHOOK
              done
             else
               # Tests were found and executed (pass or fail)
               echo "Tests were found: $TOTAL_TESTS"
               # Success notification already sent in previous step, no additional notification needed
             fi
           else
             # No test results file - this means pipeline failed before tests could run
             echo "No test results file found - pipeline likely failed"
             BRANCH_NAME="${{ github.ref_name || github.ref || 'unknown' }}"
             ENVIRONMENT="${{ inputs.environment || 'qa' }}"
             MODULE_NAME="${{ inputs.module_name || 'content' }}-${{ inputs.test_category || 'ui' }}"
             FAILURE_MESSAGE="<!subteam^S087M3C16GL> 🚨 *Content Regression Automation Suite Pipeline Failed* - \`${MODULE_NAME}\` module pipeline triggered by \`${{ github.actor }}\` from \`${BRANCH_NAME}\` branch on \`${ENVIRONMENT}\` environment could not be executed successfully. Please check the job details for debugging. | <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|🔍 Job Details>"

             # Send to Slack using curl
             for WEBHOOK in "${WEBHOOKS[@]}"; do
               curl -X POST -H 'Content-type: application/json' \
                 --data "{\"text\":\"$FAILURE_MESSAGE\"}" \
                 $WEBHOOK
             done
           fi
