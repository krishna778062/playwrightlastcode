name: UAT Regression (Reusable Template)

on:
  workflow_call:
    inputs:
      environment:
        description: 'UAT environment name (e.g., uat, uat-us, uat-eu, uat-au)'
        required: false
        default: 'uat'
        type: string
      enable_browserstack:
        description: 'Enable BrowserStack Test Observability reporting'
        required: false
        default: true
        type: boolean

permissions:
  contents: read
  id-token: write
  pages: write

jobs:
  check-stage:
    runs-on: [kubernetes]
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
      checkout_ref: ${{ steps.check.outputs.checkout_ref }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine checkout ref for UAT regression tests
        id: check
        env:
          CURRENT_STAGE: ${{ vars.CURRENT_STAGE }}
        run: |
          STAGE=${CURRENT_STAGE:-qa}
          echo "Current stage: $STAGE"

          if [ "$STAGE" == "production" ]; then
            # Release completed - use main HEAD
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "checkout_ref=main" >> $GITHUB_OUTPUT
            echo "✅ Production stage - will test main HEAD"
            
          elif [ "$STAGE" == "uat" ]; then
            # Active release - use latest UAT tag
            TAG=$(git ls-remote --tags origin | \
                  grep -o 'refs/tags/.*-uat\.[0-9]*$' | \
                  sort -V | tail -n1 | cut -d'/' -f3)
            
            if [ -z "$TAG" ]; then
              echo "should_run=false" >> $GITHUB_OUTPUT
              echo "⏭️ No UAT tags found - skipping"
            else
              echo "should_run=true" >> $GITHUB_OUTPUT
              echo "checkout_ref=$TAG" >> $GITHUB_OUTPUT
              echo "✅ UAT stage - will test tag: $TAG"
            fi
            
          else
            # QA stage - skip UAT tests
            echo "should_run=false" >> $GITHUB_OUTPUT
            echo "⏭️ Skipping (current stage: $STAGE)"
          fi

  regression-tests:
    needs: check-stage
    if: needs.check-stage.outputs.should_run == 'true'
    timeout-minutes: 200
    runs-on: [kubernetes]
    strategy:
      fail-fast: false
      matrix:
        module: [
            chat,
            # platforms,
            # global-search,
            # content,
            # de,
            # de-api,
            # de-api-abac,
            # reward,
            # reward-settings,
            # recognition,
            # privateRecognition,
            # content-abac,
            # frontline,
            # content-settings,
            # content-studio,
            # alert-notification,
            # employee-listening,
            # form-designer,
            # comms-planner,
          ] # de is short for data-engineering
    env:
      S3_BUCKET: simpplr-e2e-automation-958465808810-us-west-2
      MODULE_NAME: ${{ matrix.module }}
      TEST_ENV: ${{ inputs.environment }}
      SLACK_WEBHOOK_URL: https://hooks.slack.com/services/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
      # BrowserStack SDK Configuration (overrides browserstack.yml)
      BROWSERSTACK_USERNAME: ${{ secrets.BROWSERSTACK_USERNAME }}
      BROWSERSTACK_ACCESS_KEY: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}
      BROWSERSTACK_PROJECT_NAME: ${{ matrix.module }}-automation
      BROWSERSTACK_BUILD_NAME: ${{ matrix.module }}-${{ inputs.environment }}-${{ github.run_number }}
      BROWSERSTACK_BUILD_IDENTIFIER: '#${{ github.run_number }}-${{ github.run_attempt }}'
      # Custom tags for filtering in BrowserStack dashboard
      BROWSERSTACK_BUILD_TAG: ${{ inputs.environment }}
      CUSTOM_TAG_1: ${{ matrix.module }}
      CUSTOM_TAG_2: ${{ inputs.environment }}
      CUSTOM_TAG_3: uat-regression
    steps:
      - name: Display configuration
        run: |
          echo "🌍 Environment: ${{ inputs.environment }}"
          echo "🔖 Git Ref: ${{ needs.check-stage.outputs.checkout_ref }}"
          echo "📦 Module: ${{ matrix.module }}"
          echo "🔗 BrowserStack: ${{ inputs.enable_browserstack && 'Enabled' || 'Disabled' }}"
          if [ "${{ inputs.enable_browserstack }}" = "true" ]; then
            echo "   └── Project: ${{ matrix.module }}-automation"
            echo "   └── Build: ${{ matrix.module }}-${{ inputs.environment }}-${{ github.run_number }}"
            echo "   └── Tags: ${{ matrix.module }}, ${{ inputs.environment }}, uat-regression"
          fi

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.check-stage.outputs.checkout_ref }}

      - name: set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ghostscript imagemagick graphicsmagick

      - name: Run regression tests
        run: |
          # Determine test script suffix based on BrowserStack flag
          if [ "${{ inputs.enable_browserstack }}" = "true" ]; then
            echo "🔗 BrowserStack Test Observability: ENABLED"
            echo "   Project: $BROWSERSTACK_PROJECT_NAME"
            echo "   Build: $BROWSERSTACK_BUILD_NAME"
            echo "   Tags: $CUSTOM_TAG_1, $CUSTOM_TAG_2, $CUSTOM_TAG_3"
            BS_SUFFIX="-browserstack"
          else
            echo "📊 BrowserStack Test Observability: DISABLED"
            BS_SUFFIX=""
          fi

          # Build the test script name
          TEST_SCRIPT="test:${{ matrix.module }}${BS_SUFFIX}"
          echo "Running: npm run ${TEST_SCRIPT}"

          if [ "${{ matrix.module }}" = "reward" ]; then
            echo "Running Reward tests (excluding P3) and with 3 workers..."
            npm run ${TEST_SCRIPT} -- --grep-invert=P3 --workers=3
          elif [ "${{ matrix.module }}" = "reward-settings" ]; then
            echo "Running Reward Settings tests (excluding P3) and with 1 worker..."
            npm run ${TEST_SCRIPT} -- --grep-invert=P3 --workers=1
          else
            npm run ${TEST_SCRIPT} -- --workers=3
          fi

      - name: Upload test report to github artifact backup
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report-${{ matrix.module }}-${{ inputs.environment }}
          path: |
            playwright-report
            test-results

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4.1.0
        with:
          aws-access-key-id: ${{ secrets.CICD_USER_AGENT_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.CICD_USER_AGENT_SECRET_ACCESS_KEY }}
          role-to-assume: 'arn:aws:iam::693891728731:role/non-prod-deployer'
          aws-region: 'us-west-2'
          role-skip-session-tagging: true
          role-duration-seconds: 1200

      - name: Set timestamp
        id: timestamp
        run: |
          echo "TIMESTAMP=$(date +"%Y-%m-%d-%H-%M-%S")" >> $GITHUB_ENV
          echo "Timestamp set to: $TIMESTAMP"

      - name: Generate HTML Report
        if: always()
        run: |
          npm run generate-report:custom test-results/test-results.json

      - name: Generate Tag Report
        if: always()
        run: |
          # Generate tag report from existing test results
          npm run generate-tag-report

      - name: Upload Report to S3
        if: always()
        run: |
          # Upload to timestamped folder
          echo "Uploading report to S3..."
          aws s3 cp playwright-report s3://${S3_BUCKET}/${MODULE_NAME}/runs/${{ env.TIMESTAMP }}-${{ github.run_id }} --recursive

          # Update latest folder (overwrites existing files)
          echo "Updating latest folder..."
          aws s3 cp playwright-report s3://${S3_BUCKET}/${MODULE_NAME}/latest --recursive

          # Create index.html in module root to redirect to latest
          echo '<!DOCTYPE html>
          <html>
            <head>
              <meta http-equiv="refresh" content="0; url=./latest/index.html">
            </head>
            <body>
              <p>Redirecting to latest report...</p>
            </body>
          </html>' > index.html

          aws s3 cp index.html s3://${S3_BUCKET}/${MODULE_NAME}/index.html

          echo "Report uploaded successfully!"
          echo "Latest report available at: s3://${S3_BUCKET}/${MODULE_NAME}/latest"
          echo "Timestamped report available at: s3://${S3_BUCKET}/${MODULE_NAME}/runs/${{ env.TIMESTAMP }}-${{ github.run_id }}"
          echo ""
          echo "📊 Test Report Links:"
          echo "🔗 Latest Report: https://playwrite.simpplr.xyz/results/${MODULE_NAME}/latest/index.html"
          echo "📅 Timestamped Report: https://playwrite.simpplr.xyz/results/${MODULE_NAME}/runs/${{ env.TIMESTAMP }}-${{ github.run_id }}/index.html"
          echo "🏷️ Tag Report: https://playwrite.simpplr.xyz/results/${MODULE_NAME}/latest/tag-report.html"

          # Store report links for Slack notification
          echo "LATEST_REPORT_URL=https://playwrite.simpplr.xyz/results/${MODULE_NAME}/latest/index.html" >> $GITHUB_ENV
          echo "TIMESTAMPED_REPORT_URL=https://playwrite.simpplr.xyz/results/${MODULE_NAME}/runs/${{ env.TIMESTAMP }}-${{ github.run_id }}/index.html" >> $GITHUB_ENV
          echo "TAG_REPORT_URL=https://playwrite.simpplr.xyz/results/${MODULE_NAME}/latest/tag-report.html" >> $GITHUB_ENV

          # BrowserStack Test Observability dashboard link
          if [ "${{ inputs.enable_browserstack }}" = "true" ]; then
            echo "BROWSERSTACK_DASHBOARD_URL=https://observability.browserstack.com/builds?project=${{ matrix.module }}-automation&build=${{ matrix.module }}-${{ inputs.environment }}-${{ github.run_number }}" >> $GITHUB_ENV
            echo "🔗 BrowserStack Dashboard: https://observability.browserstack.com/builds?project=${{ matrix.module }}-automation"
          fi

      - name: Upload Regression Data to Postgres
        if: always()
        env:
          DB_POOL_MAX: 3
          DB_POOL_MIN: 1
          DB_CONNECTION_TIMEOUT: 10000
          DB_ACQUIRE_TIMEOUT: 60000
          DB_IDLE_TIMEOUT: 15000
          DB_ALLOW_EXIT_ON_IDLE: true
          PG_DB_HOST: ${{secrets.PG_DB_HOST}}
          PG_DB_PORT: ${{secrets.PG_DB_PORT}}
          PG_DB_NAME: ${{secrets.PG_DB_NAME}}
          PG_DB_USER: ${{secrets.PG_DB_USER}}
          PG_DB_PASSWORD: ${{secrets.PG_DB_PASSWORD}}
          TEAM_NAME: core
          MODULE_NAME: ${{ matrix.module }}
          IS_REGRESSION: true
        run: |
          # Upload regression data to postgres
          echo "Uploading regression data to postgres..."
          # set the env variable to set the meta data for the report
          REPORT_PATH=${{ env.TIMESTAMPED_REPORT_URL }} npm run report:postgres
          echo "Regression data uploaded successfully to postgres"

      - name: Parse Test Results
        if: always()
        run: |
          # Parse test results from test-results directory
          if [ -f "test-results/test-results.json" ]; then
            TOTAL_TESTS=$(jq -r '.stats.expected + .stats.unexpected + .stats.skipped + .stats.flaky' test-results/test-results.json)
            PASSED_TESTS=$(jq -r '.stats.expected' test-results/test-results.json)
            FAILED_TESTS=$(jq -r '.stats.unexpected' test-results/test-results.json)
            SKIPPED_TESTS=$(jq -r '.stats.skipped' test-results/test-results.json)
            FLAKY_TESTS=$(jq -r '.stats.flaky' test-results/test-results.json)

            # Count known failures from annotations
            KNOWN_FAILED=$(node -e "
              const fs = require('fs');
              const data = JSON.parse(fs.readFileSync('test-results/test-results.json', 'utf8'));
              const knownFailed = data.suites.flatMap(s =>
                (s.suites || []).flatMap(ss =>
                  (ss.specs || []).flatMap(sp =>
                    (sp.tests || []).filter(t =>
                      t.status === 'unexpected' &&
                      t.annotations && t.annotations.some(a => a.type === 'known_failure')
                    )
                  )
                )
              ).length;
              console.log(knownFailed);
            ")

            # Calculate actual failures (excluding known failures)
            ACTUAL_FAILED=$((FAILED_TESTS - KNOWN_FAILED))
          else
            TOTAL_TESTS=0
            PASSED_TESTS=0
            FAILED_TESTS=0
            SKIPPED_TESTS=0
            FLAKY_TESTS=0
            KNOWN_FAILED=0
            ACTUAL_FAILED=0
          fi

          echo "TOTAL_TESTS=$TOTAL_TESTS" >> $GITHUB_ENV
          echo "PASSED_TESTS=$PASSED_TESTS" >> $GITHUB_ENV
          echo "FAILED_TESTS=$FAILED_TESTS" >> $GITHUB_ENV
          echo "SKIPPED_TESTS=$SKIPPED_TESTS" >> $GITHUB_ENV
          echo "FLAKY_TESTS=$FLAKY_TESTS" >> $GITHUB_ENV
          echo "KNOWN_FAILED=$KNOWN_FAILED" >> $GITHUB_ENV
          echo "ACTUAL_FAILED=$ACTUAL_FAILED" >> $GITHUB_ENV

          echo "Test Results:"
          echo "Total: $TOTAL_TESTS, Passed: $PASSED_TESTS, Failed: $FAILED_TESTS (Actual: $ACTUAL_FAILED, Known: $KNOWN_FAILED), Skipped: $SKIPPED_TESTS, Flaky: $FLAKY_TESTS"

      - name: Send Slack Notification
        if: always()
        run: |
          # Only send notification if tests actually ran (TOTAL_TESTS > 0)
          if [ "${{ env.TOTAL_TESTS }}" -gt 0 ]; then
            # Build BrowserStack link if enabled
            BS_LINK=""
            if [ "${{ inputs.enable_browserstack }}" = "true" ]; then
              BS_LINK=" | <${{ env.BROWSERSTACK_DASHBOARD_URL }}|🔬 BrowserStack>"
            fi
            
            # Prepare Slack message with hyperlinks
            if [ "${{ env.KNOWN_FAILED }}" -gt 0 ]; then
              MESSAGE="🧪 *UAT Regression* - \`${{ matrix.module }}\` module on \`${{ inputs.environment }}\` (\`${{ needs.check-stage.outputs.checkout_ref }}\`) completed with ${{ env.TOTAL_TESTS }} tests (${{ env.PASSED_TESTS }} ✅ ${{ env.ACTUAL_FAILED }} ❌ ${{ env.SKIPPED_TESTS }} ⏭️ ${{ env.FLAKY_TESTS }} ⚠️) ↪ Known failures: ${{ env.KNOWN_FAILED }} | <${{ env.TIMESTAMPED_REPORT_URL }}|📊 Report> | <${{ env.TAG_REPORT_URL }}|🏷️ Tags>${BS_LINK} | <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|🔍 Details>"
            else
              MESSAGE="🧪 *UAT Regression* - \`${{ matrix.module }}\` module on \`${{ inputs.environment }}\` (\`${{ needs.check-stage.outputs.checkout_ref }}\`) completed with ${{ env.TOTAL_TESTS }} tests (${{ env.PASSED_TESTS }} ✅ ${{ env.ACTUAL_FAILED }} ❌ ${{ env.SKIPPED_TESTS }} ⏭️ ${{ env.FLAKY_TESTS }} ⚠️) | <${{ env.TIMESTAMPED_REPORT_URL }}|📊 Report> | <${{ env.TAG_REPORT_URL }}|🏷️ Tags>${BS_LINK} | <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|🔍 Details>"
            fi
            echo "MESSAGE: $MESSAGE"
            # Send to Slack using curl
            curl -X POST -H 'Content-type: application/json' \
              --data "{\"text\":\"$MESSAGE\"}" \
              $SLACK_WEBHOOK_URL
          else
            echo "No tests ran, skipping success notification"
          fi

      - name: Send Smart Slack Notifications
        if: always()
        run: |
          # Check if tests were executed
          if [ -f "test-results/test-results.json" ]; then
            TOTAL_TESTS=$(jq -r '.stats.expected + .stats.unexpected + .stats.skipped' test-results/test-results.json)

            if [ "$TOTAL_TESTS" -eq 0 ]; then
              # No tests found
              echo "No tests were found matching the criteria"
              NO_TESTS_MESSAGE="⚠️ *UAT Regression: No Tests Found* - \`${{ matrix.module }}\` module on \`${{ inputs.environment }}\` (\`${{ needs.check-stage.outputs.checkout_ref }}\`) found no tests matching the criteria. Please check your test filters. | <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|🔍 Details>"
              echo "NO_TESTS_MESSAGE: $NO_TESTS_MESSAGE"
              curl -X POST -H 'Content-type: application/json' \
                --data "{\"text\":\"$NO_TESTS_MESSAGE\"}" \
                $SLACK_WEBHOOK_URL
            else
              # Tests were found and executed (pass or fail)
              echo "Tests were found: $TOTAL_TESTS"
              # Success notification already sent in previous step, no additional notification needed
            fi
          else
            # No test results file - this means pipeline failed before tests could run
            echo "No test results file found - pipeline likely failed"
            FAILURE_MESSAGE="🚨 *UAT Regression Pipeline Failed* - \`${{ matrix.module }}\` module on \`${{ inputs.environment }}\` (\`${{ needs.check-stage.outputs.checkout_ref }}\`) could not execute. Please check job details for debugging. | <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|🔍 Details>"
            echo "FAILURE_MESSAGE: $FAILURE_MESSAGE"
            curl -X POST -H 'Content-type: application/json' \
              --data "{\"text\":\"$FAILURE_MESSAGE\"}" \
              $SLACK_WEBHOOK_URL
          fi
