# name: UI E2E Tests
name: Test AWS S3 Connection

on:
  workflow_dispatch: # allows manual triggering of the workflow
    inputs:
      environment:
        description: 'Select the environment to run tests against'
        required: true
        default: 'qa'
        type: choice
        options:
          - 'qa'
          - 'uat'

jobs:
  test-aws-connection:
    runs-on: [kubernetes]
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # Configure AWS Credentials with Role Assumption
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          role-to-assume: arn:aws:iam::693891728731:role/non-prod-deployer
          aws-region: us-west-2
          role-session-name: GithubActionsSession
          role-duration-seconds: 1200 # 20 minutes
          output-credentials: true

      # Test S3 Access
      - name: List S3 Bucket Contents
        run: |
          echo "Attempting to list contents of S3 bucket..."
          aws s3 ls s3://simpplr-e2e-automation 
          echo "Successfully listed bucket contents!"
