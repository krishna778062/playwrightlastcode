name: UI E2E Tests

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch: # allows manual triggering of the workflow
    inputs:
      module_name:
        description: 'Select the module to test'
        required: true
        default: 'chat'
        type: choice
        options:
          - 'chat'
          - 'feed'
      priority_filter:
        description: 'Select test cases by priority'
        required: true
        default: '@P0'
        type: choice
        options:
          - '@P0'
          - '@P1'

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  test-and-deploy:
    timeout-minutes: 60
    runs-on: [kubernetes]
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run playwright tests
        run: npm run test:${{ inputs.module_name || 'chat' }} -- --grep=${{ inputs.priority_filter || '@P0' }}

      - name: Generate HTML Report
        if: always()
        env:
          # Use PAGES_URL if set, otherwise construct from repository info
          TRACE_VIEWER_BASE_URL: ${{ vars.PAGES_URL || format('https://{0}', steps.deployment.outputs.page_url) }}
        run: |
          echo "Using base URL: $TRACE_VIEWER_BASE_URL"
          npm run generate-report:custom test-results/test-results.json

      - name: Prepare deployment content
        if: always()
        run: |
          mkdir -p deploy-content
          cp -r test-results deploy-content/
          cp -r playwright-report/* deploy-content/

      - name: Upload Pages Artifact
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: deploy-content

      - name: Deploy to GitHub Pages
        if: always()
        id: deployment
        uses: actions/deploy-pages@v4
