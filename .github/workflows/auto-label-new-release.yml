name: Auto Label New Release PR #dummy comment

on:
  pull_request:
    types: [opened, reopened]
    branches:
      - release

jobs:
  auto-label:
    runs-on: [kubernetes]
    steps:
      - name: Check if PR is from develop
        id: check
        run: |
          SOURCE_BRANCH="${{ github.event.pull_request.head.ref }}"
          echo "Source branch: $SOURCE_BRANCH"

          if [ "$SOURCE_BRANCH" == "develop" ]; then
            echo "is_from_develop=true" >> $GITHUB_OUTPUT
            echo "✅ PR is from develop - will add 'new-release' label"
          else
            echo "is_from_develop=false" >> $GITHUB_OUTPUT
            echo "⏭️ PR is from $SOURCE_BRANCH - skipping label"
          fi

      - name: Add new-release label
        if: steps.check.outputs.is_from_develop == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['new-release']
            })

      - name: Comment on PR
        if: steps.check.outputs.is_from_develop == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '🚀 **New Release Detected**\n\nThis PR is from the `develop` branch and will create a new release with an incremented base version.\n\n✅ Label `new-release` has been automatically added.\n\n**What happens when merged:**\n- Base version will increment (e.g., 25.12 → 25.13)\n- New QA tag will be created (e.g., 25.13-qa.1)\n- Stage will reset to QA'
            })
