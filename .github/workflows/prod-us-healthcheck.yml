name: Prod US Healthcheck

on:
  schedule:
    # Run daily at 10:30 PM UTC (4:00 AM IST next day)
    - cron: '30 22 * * *'
  workflow_dispatch:

jobs:
  healthcheck:
    uses: ./.github/workflows/prod-healthcheck-template.yml
    with:
      environment: prodUS
      git_ref: main
    secrets: inherit
