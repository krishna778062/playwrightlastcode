name: UAT Daily Regression Tests (Release Testing)

on:
  schedule:
    # Run daily at 4 AM UTC
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  check-stage:
    runs-on: [kubernetes]
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
      uat_tag: ${{ steps.get-tag.outputs.tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if UAT stage is active
        id: check
        env:
          CURRENT_STAGE: ${{ vars.CURRENT_STAGE }}
        run: |
          STAGE=${CURRENT_STAGE:-qa}
          if [ "$STAGE" == "uat" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "✅ UAT stage is active"
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
            echo "⏭️ Skipping (current stage: $STAGE)"
          fi

      - name: Get latest UAT tag
        id: get-tag
        if: steps.check.outputs.should_run == 'true'
        run: |
          TAG=$(git ls-remote --tags origin | \
                grep -o 'refs/tags/.*-uat\.[0-9]*$' | \
                sort -V | tail -n1 | cut -d'/' -f3)

          if [ -z "$TAG" ]; then
            echo "tag=release" >> $GITHUB_OUTPUT
          else
            echo "tag=$TAG" >> $GITHUB_OUTPUT
            echo "✅ Will test: $TAG"
          fi

  regression:
    needs: check-stage
    if: needs.check-stage.outputs.should_run == 'true'
    uses: ./.github/workflows/regression-template.yml
    with:
      environment: uat
      git_ref: ${{ needs.check-stage.outputs.uat_tag }}
      slack_prefix: UAT Daily Regression
    secrets: inherit
