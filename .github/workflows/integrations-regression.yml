name: Integrations Regression Tests

on:
  schedule:
    # Run only on Monday, Wednesday, Friday at 1 AM UTC
    - cron: '0 1 * * 1,3,5'
  workflow_dispatch: # allows manual triggering for testing

permissions:
  contents: read
  id-token: write
  pages: write

jobs:
  integrations-regression-tests:
    timeout-minutes: 200
    runs-on: [kubernetes]
    strategy:
      fail-fast: false
      matrix:
        module: [integrations-primary, integrations-workday]
        environment: [qa]
    env:
      S3_BUCKET: simpplr-e2e-automation-958465808810-us-west-2
      MODULE_NAME: ${{ matrix.module }}
      SLACK_WEBHOOK_URL: https://hooks.slack.com/services/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
    steps:
      - name: Record Start Time
        id: start-time
        run: |
          echo "START_TIME=$(date +%s)" >> $GITHUB_ENV
          echo "START_TIME_READABLE=$(date '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_ENV
          echo "Job started at: $(date '+%Y-%m-%d %H:%M:%S UTC')"

      - name: Checkout code
        uses: actions/checkout@v3

      - name: Create Calendar Secrets JSON
        run: |
          echo '${{ vars.CALENDAR_SECRETS }}' > githubSecrets.json
          echo "✅ Created githubSecrets.json with Google and Outlook Calendar credentials for CI environment"

      - name: set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Check if integrations should run today
        id: check-integrations-schedule
        run: |
          # Get current day of week (1=Monday, 7=Sunday)
          DAY_OF_WEEK=$(date +%u)
          # Get current day of month
          DAY_OF_MONTH=$(date +%d)

          # Check: Verify today is Monday, Wednesday, or Friday (1, 3, 5)
          # Cron is already set to run only on these days, but this is a safeguard
          if [[ "$DAY_OF_WEEK" == "1" || "$DAY_OF_WEEK" == "3" || "$DAY_OF_WEEK" == "5" ]]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "Schedule Check Passed: Running integrations regression on $(date +%A), $(date +%B) $DAY_OF_MONTH at $(date +%T) UTC"
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
            echo "Schedule Check: Skipping run - Today is $(date +%A), $(date +%B) $DAY_OF_MONTH (Tests only run on Mon/Wed/Fri)"
          fi

      - name: Run integrations regression tests
        if: steps.check-integrations-schedule.outputs.should_run == 'true'
        env:
          TEST_ENV: ${{ matrix.environment }}
        run: |
          # Run integrations regression tests
          npm run test:${{ matrix.module }} -- --workers=5

      - name: Upload test report to github artifact backup
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report-${{ matrix.module }}-${{ matrix.environment }}
          path: |
            playwright-report
            test-results

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4.1.0
        with:
          aws-access-key-id: ${{ secrets.CICD_USER_AGENT_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.CICD_USER_AGENT_SECRET_ACCESS_KEY }}
          role-to-assume: 'arn:aws:iam::693891728731:role/non-prod-deployer'
          aws-region: 'us-west-2'
          role-skip-session-tagging: true
          role-duration-seconds: 1200

      - name: Set timestamp
        id: timestamp
        run: |
          echo "TIMESTAMP=$(date +"%Y-%m-%d-%H-%M-%S")" >> $GITHUB_ENV
          echo "Timestamp set to: $TIMESTAMP"

      - name: Generate HTML Report
        if: always()
        run: |
          npm run generate-report:custom test-results/test-results.json

      - name: Generate Tag Report
        if: always()
        run: |
          npm run generate-tag-report

      - name: Upload Report to S3
        if: always()
        run: |
          # Upload to timestamped folder
          echo "Uploading report to S3..."
          aws s3 cp playwright-report s3://${S3_BUCKET}/${MODULE_NAME}/runs/${{ env.TIMESTAMP }}-${{ github.run_id }} --recursive

          # Update latest folder (overwrites existing files)
          echo "Updating latest folder..."
          aws s3 cp playwright-report s3://${S3_BUCKET}/${MODULE_NAME}/latest --recursive

          # Create index.html in module root to redirect to latest
          echo '<!DOCTYPE html>
          <html>
            <head>
              <meta http-equiv="refresh" content="0; url=./latest/index.html">
            </head>
            <body>
              <p>Redirecting to latest report...</p>
            </body>
          </html>' > index.html

          aws s3 cp index.html s3://${S3_BUCKET}/${MODULE_NAME}/index.html

          echo "Report uploaded successfully!"
          echo "Latest report available at: s3://${S3_BUCKET}/${MODULE_NAME}/latest"
          echo "Timestamped report available at: s3://${S3_BUCKET}/${MODULE_NAME}/runs/${{ env.TIMESTAMP }}-${{ github.run_id }}"
          echo ""
          echo "📊 Test Report Links:"
          echo "🔗 Latest Report: https://playwrite.simpplr.xyz/results/${MODULE_NAME}/latest/index.html"
          echo "🏷️ Latest Tag Report: https://playwrite.simpplr.xyz/results/${MODULE_NAME}/latest/tag-report.html"
          echo "📅 Timestamped Report: https://playwrite.simpplr.xyz/results/${MODULE_NAME}/runs/${{ env.TIMESTAMP }}-${{ github.run_id }}/index.html"
          echo "📅 Timestamped Tag Report: https://playwrite.simpplr.xyz/results/${MODULE_NAME}/runs/${{ env.TIMESTAMP }}-${{ github.run_id }}/tag-report.html"

          # Store report links for Slack notification
          echo "LATEST_REPORT_URL=https://playwrite.simpplr.xyz/results/${MODULE_NAME}/latest/index.html" >> $GITHUB_ENV
          echo "LATEST_TAG_REPORT_URL=https://playwrite.simpplr.xyz/results/${MODULE_NAME}/latest/tag-report.html" >> $GITHUB_ENV
          echo "TIMESTAMPED_REPORT_URL=https://playwrite.simpplr.xyz/results/${MODULE_NAME}/runs/${{ env.TIMESTAMP }}-${{ github.run_id }}/index.html" >> $GITHUB_ENV
          echo "TIMESTAMPED_TAG_REPORT_URL=https://playwrite.simpplr.xyz/results/${MODULE_NAME}/runs/${{ env.TIMESTAMP }}-${{ github.run_id }}/tag-report.html" >> $GITHUB_ENV

      - name: Upload Regression Data to Postgres
        if: always()
        env:
          DB_POOL_MAX: 3
          DB_POOL_MIN: 1
          DB_CONNECTION_TIMEOUT: 10000
          DB_ACQUIRE_TIMEOUT: 60000
          DB_IDLE_TIMEOUT: 15000
          DB_ALLOW_EXIT_ON_IDLE: true
          PG_DB_HOST: ${{secrets.PG_DB_HOST}}
          PG_DB_PORT: ${{secrets.PG_DB_PORT}}
          PG_DB_NAME: ${{secrets.PG_DB_NAME}}
          PG_DB_USER: ${{secrets.PG_DB_USER}}
          PG_DB_PASSWORD: ${{secrets.PG_DB_PASSWORD}}
          TEAM_NAME: core
          TEST_ENV: ${{ matrix.environment }}
          MODULE_NAME: ${{ matrix.module }}
          IS_REGRESSION: true
        run: |
          # Upload regression data to postgres
          echo "Uploading regression data to postgres..."
          # set the env variable to set the meta data for the report
          REPORT_PATH=${{ env.TIMESTAMPED_REPORT_URL }} npm run report:postgres
          echo "Regression data uploaded successfully to postgres"

      - name: Parse Test Results
        if: always()
        run: |
          # Parse test results from test-results directory
          if [ -f "test-results/test-results.json" ]; then
            TOTAL_TESTS=$(jq -r '.stats.expected + .stats.unexpected + .stats.skipped + .stats.flaky' test-results/test-results.json)
            PASSED_TESTS=$(jq -r '.stats.expected' test-results/test-results.json)
            FAILED_TESTS=$(jq -r '.stats.unexpected' test-results/test-results.json)
            SKIPPED_TESTS=$(jq -r '.stats.skipped' test-results/test-results.json)
            FLAKY_TESTS=$(jq -r '.stats.flaky' test-results/test-results.json)
            
            # Count known failures from annotations
            KNOWN_FAILED=$(node -e "
              const fs = require('fs');
              const data = JSON.parse(fs.readFileSync('test-results/test-results.json', 'utf8'));
              const knownFailed = data.suites.flatMap(s => 
                (s.suites || []).flatMap(ss => 
                  (ss.specs || []).flatMap(sp => 
                    (sp.tests || []).filter(t => 
                      t.status === 'unexpected' && 
                      t.annotations && t.annotations.some(a => a.type === 'known_failure')
                    )
                  )
                )
              ).length;
              console.log(knownFailed);
            ")
            
            # Calculate actual failures (excluding known failures)
            ACTUAL_FAILED=$((FAILED_TESTS - KNOWN_FAILED))
          else
            TOTAL_TESTS=0
            PASSED_TESTS=0
            FAILED_TESTS=0
            SKIPPED_TESTS=0
            FLAKY_TESTS=0
            KNOWN_FAILED=0
            ACTUAL_FAILED=0
          fi

          echo "TOTAL_TESTS=$TOTAL_TESTS" >> $GITHUB_ENV
          echo "PASSED_TESTS=$PASSED_TESTS" >> $GITHUB_ENV
          echo "FAILED_TESTS=$FAILED_TESTS" >> $GITHUB_ENV
          echo "SKIPPED_TESTS=$SKIPPED_TESTS" >> $GITHUB_ENV
          echo "FLAKY_TESTS=$FLAKY_TESTS" >> $GITHUB_ENV
          echo "KNOWN_FAILED=$KNOWN_FAILED" >> $GITHUB_ENV
          echo "ACTUAL_FAILED=$ACTUAL_FAILED" >> $GITHUB_ENV

          echo "Test Results:"
          echo "Total: $TOTAL_TESTS, Passed: $PASSED_TESTS, Failed: $FAILED_TESTS (Actual: $ACTUAL_FAILED, Known: $KNOWN_FAILED), Skipped: $SKIPPED_TESTS, Flaky: $FLAKY_TESTS"

      - name: Send Slack Notification
        if: always()
        run: |
          # Only send notification if tests actually ran (TOTAL_TESTS > 0)
          if [ "${{ env.TOTAL_TESTS }}" -gt 0 ]; then
            # Prepare Slack message with hyperlinks for integrations
            if [ "${{ env.KNOWN_FAILED }}" -gt 0 ]; then
              MESSAGE="🧪 *Integrations Regression (Mon/Wed/Fri)* - \`${{ matrix.module }}\` module on \`${{ matrix.environment }}\` environment concluded with ${{ env.TOTAL_TESTS }} tests (${{ env.PASSED_TESTS }} ✅ ${{ env.ACTUAL_FAILED }} ❌ ${{ env.SKIPPED_TESTS }} ⏭️ ${{ env.FLAKY_TESTS }} ⚠️) ↪ Known failures: ${{ env.KNOWN_FAILED }} | <${{ env.TIMESTAMPED_REPORT_URL }}|📊 View Report> | <${{ env.TIMESTAMPED_TAG_REPORT_URL }}|🏷️ Tag Report> | <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|🔍 Job Details>"
            else
              MESSAGE="🧪 *Integrations Regression (Mon/Wed/Fri)* - \`${{ matrix.module }}\` module on \`${{ matrix.environment }}\` environment concluded with ${{ env.TOTAL_TESTS }} tests (${{ env.PASSED_TESTS }} ✅ ${{ env.ACTUAL_FAILED }} ❌ ${{ env.SKIPPED_TESTS }} ⏭️ ${{ env.FLAKY_TESTS }} ⚠️) | <${{ env.TIMESTAMPED_REPORT_URL }}|📊 View Report> | <${{ env.TIMESTAMPED_TAG_REPORT_URL }}|🏷️ Tag Report> | <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|🔍 Job Details>"
            fi
            echo "MESSAGE: $MESSAGE"
            # Send to Slack using curl
            curl -X POST -H 'Content-type: application/json' \
              --data "{\"text\":\"$MESSAGE\"}" \
              $SLACK_WEBHOOK_URL
          else
            echo "No tests ran, skipping success notification"
          fi

      - name: Send Smart Slack Notifications
        if: always()
        run: |
          # Check if tests were executed
          if [ -f "test-results/test-results.json" ]; then
            TOTAL_TESTS=$(jq -r '.stats.expected + .stats.unexpected + .stats.skipped' test-results/test-results.json)

            if [ "$TOTAL_TESTS" -eq 0 ]; then
              # No tests found
              echo "No tests were found matching the criteria"
              NO_TESTS_MESSAGE="⚠️ *Integrations Regression: No Tests Found* - \`${{ matrix.module }}\` module on \`${{ matrix.environment }}\` environment found no tests matching the criteria. Please check your test filters. | <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|🔍 Job Details>"
              echo "NO_TESTS_MESSAGE: $NO_TESTS_MESSAGE"
              curl -X POST -H 'Content-type: application/json' \
                --data "{\"text\":\"$NO_TESTS_MESSAGE\"}" \
                $SLACK_WEBHOOK_URL
            else
              # Tests were found and executed (pass or fail)
              echo "Tests were found: $TOTAL_TESTS"
              # Success notification already sent in previous step, no additional notification needed
            fi
          else
            # No test results file - this means pipeline failed before tests could run
            echo "No test results file found - pipeline likely failed"
            FAILURE_MESSAGE="🚨 *Integrations Regression Pipeline Failed* - \`${{ matrix.module }}\` module pipeline on \`${{ matrix.environment }}\` environment could not be executed successfully. Please check the job details for debugging. | <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|🔍 Job Details>"
            echo "FAILURE_MESSAGE: $FAILURE_MESSAGE"
            curl -X POST -H 'Content-type: application/json' \
              --data "{\"text\":\"$FAILURE_MESSAGE\"}" \
              $SLACK_WEBHOOK_URL
          fi

      - name: Check Execution Duration and Alert if Exceeded
        if: always()
        run: |
          # Calculate job duration
          END_TIME=$(date +%s)
          DURATION_SECONDS=$((END_TIME - ${{ env.START_TIME }}))
          DURATION_MINUTES=$((DURATION_SECONDS / 60))
          DURATION_HOURS=$((DURATION_MINUTES / 60))
          REMAINING_MINUTES=$((DURATION_MINUTES % 60))

          # Threshold in minutes (120 minutes = 2 hours)
          THRESHOLD_MINUTES=120

          echo "Job Duration: ${DURATION_HOURS}h ${REMAINING_MINUTES}m (${DURATION_MINUTES} minutes total)"
          echo "Threshold: ${THRESHOLD_MINUTES} minutes"

          # Store duration for reference
          echo "DURATION_MINUTES=$DURATION_MINUTES" >> $GITHUB_ENV
          echo "DURATION_DISPLAY=${DURATION_HOURS}h ${REMAINING_MINUTES}m" >> $GITHUB_ENV

          # Send alert if duration exceeded threshold
          if [ "$DURATION_MINUTES" -gt "$THRESHOLD_MINUTES" ]; then
            EXCEEDED_BY=$((DURATION_MINUTES - THRESHOLD_MINUTES))
            
            DURATION_ALERT="⏱️ *Integrations Regression Duration Alert* - \`${{ matrix.module }}\` module on \`${{ matrix.environment }}\` exceeded the 2-hour threshold!\n\n📊 *Execution Summary:*\n• Total Duration: *${DURATION_HOURS}h ${REMAINING_MINUTES}m* (${DURATION_MINUTES} min)\n• Threshold: 120 min (2 hours)\n• Exceeded By: *${EXCEEDED_BY} minutes*\n\n📈 *Test Results:*\n• Total: ${{ env.TOTAL_TESTS }} | ✅ Passed: ${{ env.PASSED_TESTS }} | ❌ Failed: ${{ env.FAILED_TESTS }} | ⏭️ Skipped: ${{ env.SKIPPED_TESTS }}\n\n🔗 <${{ env.TIMESTAMPED_REPORT_URL }}|📊 View Report> | <${{ env.TIMESTAMPED_TAG_REPORT_URL }}|🏷️ Tag Report> | <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|🔍 Job Details>"

            echo "DURATION_ALERT: $DURATION_ALERT"
            
            # Send duration alert to Slack
            curl -X POST -H 'Content-type: application/json' \
              --data "{\"text\":\"$DURATION_ALERT\"}" \
              $SLACK_WEBHOOK_URL
              
            echo "⚠️ Duration alert sent to Slack - Job exceeded 120 minute threshold"
          else
            echo "✅ Job completed within threshold (${DURATION_MINUTES} min <= ${THRESHOLD_MINUTES} min)"
          fi
