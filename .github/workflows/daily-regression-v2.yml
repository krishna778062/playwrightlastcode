# ============================================================================
# DAILY REGRESSION TESTS (Test Environment)
# ============================================================================
#
# PURPOSE:
#   Runs daily regression tests on the TEST environment.
#   Always uses the 'develop' branch for latest code.
#
# SCHEDULE:
#   - Runs daily at 6:00 AM UTC (11:30 AM IST)
#   - Can also be triggered manually
#
# CALLS:
#   regression-unified-template.yml with trigger_type=daily_cron
#
# ============================================================================

name: Daily Regression (v2)

on:
  schedule:
    - cron: '0 6 * * *'

  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment'
        required: false
        default: 'test'
        type: choice
        options:
          - 'test'
          - 'qa'
          - 'uat'
          - 'uatEU'
          - 'uatCA'
          - 'uatAU'
          - 'prodUS'
          - 'prodEU'
          - 'prodCA'
          - 'prodAU'

      module:
        description: 'Module to test'
        required: true
        default: 'all'
        type: choice
        options:
          - 'all'
          - 'chat'
          - 'platforms'
          - 'global-search'
          - 'content'
          - 'content-settings'
          - 'content-studio'
          - 'content-abac'
          - 'de'
          - 'de-api'
          - 'de-api-abac'
          - 'reward'
          - 'reward-settings'
          - 'recognition'
          - 'privateRecognition'
          - 'frontline'
          - 'alert-notification'
          - 'employee-listening'
          - 'form-designer'
          - 'comms-planner'

      is_browserstack:
        description: 'Enable BrowserStack'
        required: false
        default: true
        type: boolean

jobs:
  regression:
    uses: ./.github/workflows/regression-unified-template.yml
    with:
      environment: ${{ inputs.environment || 'test' }}
      trigger_type: daily_cron
      slack_prefix: Daily Regression
      git_ref: ${{ github.event_name == 'schedule' && '' || github.ref_name }}
      # Empty for 'all', otherwise single module as JSON array
      modules: ${{ inputs.module == 'all' && '' || format('["{0}"]', inputs.module) }}
      # Daily runs from develop branch where BrowserStack SDK exists
      is_browserstack: ${{ github.event_name == 'schedule' && true || inputs.is_browserstack }}
    secrets: inherit
