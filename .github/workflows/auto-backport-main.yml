name: Auto Backport from Main to Release and Develop

on:
  pull_request:
    types: [closed]
    branches:
      - main

jobs:
  backport:
    if: github.event.pull_request.merged == true
    runs-on: [kubernetes]
    env:
      SLACK_WEBHOOK_URL: 'https://hooks.slack.com/services/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'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.WORKFLOW_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Check if this is a release promotion
        id: check
        run: |
          SOURCE_BRANCH="${{ github.event.pull_request.head.ref }}"

          if [ "$SOURCE_BRANCH" == "release" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "⏭️ This is release promotion, not hotfix - skipping backport"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "✅ This is a hotfix - will proceed with backport"
          fi

      - name: Set PR info
        if: steps.check.outputs.skip == 'false'
        id: pr_info
        run: |
          echo "number=${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
          echo "title=${{ github.event.pull_request.title }}" >> $GITHUB_OUTPUT
          echo "url=${{ github.event.pull_request.html_url }}" >> $GITHUB_OUTPUT
          echo "author=${{ github.event.pull_request.user.login }}" >> $GITHUB_OUTPUT
          echo "merge_commit=${{ github.event.pull_request.merge_commit_sha }}" >> $GITHUB_OUTPUT

      # ========================================
      # BACKPORT TO RELEASE (using cherry-pick)
      # ========================================
      - name: Backport to release
        if: steps.check.outputs.skip == 'false'
        id: backport_release
        env:
          CURRENT_STAGE: ${{ vars.CURRENT_STAGE }}
        run: |
          STAGE=${CURRENT_STAGE:-qa}

          # Skip main→release backport if we're in production stage (release is dormant)
          if [ "$STAGE" == "production" ]; then
            echo "⏭️ Stage is 'production' - release branch is dormant, skipping backport to release"
            echo "success=skipped" >> $GITHUB_OUTPUT
            exit 0
          fi

          PR_NUMBER="${{ steps.pr_info.outputs.number }}"
          MERGE_COMMIT="${{ steps.pr_info.outputs.merge_commit }}"

          BACKPORT_BRANCH="backport/main-${PR_NUMBER}-to-release"
          git fetch origin release
          git checkout -b $BACKPORT_BRANCH origin/release

          echo "Created backport branch: $BACKPORT_BRANCH"

          if git cherry-pick -m 1 $MERGE_COMMIT; then
            git push origin $BACKPORT_BRANCH
            echo "success=true" >> $GITHUB_OUTPUT
            echo "branch=$BACKPORT_BRANCH" >> $GITHUB_OUTPUT
            echo "✅ Cherry-pick to release successful"
          else
            echo "success=false" >> $GITHUB_OUTPUT
            echo "❌ Cherry-pick to release failed - conflicts detected"
            
            # Get conflicting files before aborting
            CONFLICTS=$(git diff --name-only --diff-filter=U 2>/dev/null || echo "Unable to determine conflicts")
            git cherry-pick --abort 2>/dev/null || true
            
            echo "conflicts<<EOF" >> $GITHUB_OUTPUT
            echo "$CONFLICTS" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

      - name: Create PR to release
        if: steps.check.outputs.skip == 'false' && steps.backport_release.outputs.success == 'true'
        id: create_pr_release
        env:
          GH_TOKEN: ${{ secrets.WORKFLOW_TOKEN }}
        run: |
          PR_NUMBER="${{ steps.pr_info.outputs.number }}"
          PR_TITLE="${{ steps.pr_info.outputs.title }}"
          PR_URL="${{ steps.pr_info.outputs.url }}"
          PR_AUTHOR="${{ steps.pr_info.outputs.author }}"
          BRANCH="${{ steps.backport_release.outputs.branch }}"

          BODY="## 🚨 Production Hotfix Backport

          This PR backports a production hotfix from \`main\` to \`release\`.

          **Original PR:** [#${PR_NUMBER} - ${PR_TITLE}](${PR_URL})
          **Original Author:** @${PR_AUTHOR}

          ---

          ### ⚠️ Review Required

          **Please verify:**
          - [ ] Does this fix apply to the release branch?
          - [ ] Has the affected code been changed in release?
          - [ ] Are there any conflicts with release's changes?

          **Action options:**
          - ✅ **If applicable:** Approve and merge to keep release in sync with production
          - ❌ **If not applicable:** Close with reason (e.g., feature removed, production-specific)
          - 🔧 **If needs changes:** Request modifications

          ---

          **Why this exists:**
          - Production hotfixes are merged directly to \`main\`
          - This backport keeps \`release\` in sync with production fixes
          - Ensures next release includes all production fixes

          **Note:** This PR was created automatically by the backport workflow."

          BACKPORT_PR_URL=$(gh pr create \
            --base release \
            --head $BRANCH \
            --title "Backport (main→release): $PR_TITLE" \
            --body "$BODY" \
            --label "backport" \
            --label "needs-review")

          BACKPORT_PR_NUMBER=$(echo "$BACKPORT_PR_URL" | grep -oP '\d+$')

          echo "pr_url=$BACKPORT_PR_URL" >> $GITHUB_OUTPUT
          echo "pr_number=$BACKPORT_PR_NUMBER" >> $GITHUB_OUTPUT
          echo "✅ Backport PR to release created: #$BACKPORT_PR_NUMBER"

      # ========================================
      # BACKPORT TO DEVELOP (using cherry-pick)
      # ========================================
      - name: Backport to develop
        if: steps.check.outputs.skip == 'false'
        id: backport_develop
        run: |
          PR_NUMBER="${{ steps.pr_info.outputs.number }}"
          MERGE_COMMIT="${{ steps.pr_info.outputs.merge_commit }}"

          BACKPORT_BRANCH="backport/main-${PR_NUMBER}-to-develop"
          git fetch origin develop
          git checkout -b $BACKPORT_BRANCH origin/develop

          echo "Created backport branch: $BACKPORT_BRANCH"

          if git cherry-pick -m 1 $MERGE_COMMIT; then
            git push origin $BACKPORT_BRANCH
            echo "success=true" >> $GITHUB_OUTPUT
            echo "branch=$BACKPORT_BRANCH" >> $GITHUB_OUTPUT
            echo "✅ Cherry-pick to develop successful"
          else
            echo "success=false" >> $GITHUB_OUTPUT
            echo "❌ Cherry-pick to develop failed - conflicts detected"
            
            # Get conflicting files before aborting
            CONFLICTS=$(git diff --name-only --diff-filter=U 2>/dev/null || echo "Unable to determine conflicts")
            git cherry-pick --abort 2>/dev/null || true
            
            echo "conflicts<<EOF" >> $GITHUB_OUTPUT
            echo "$CONFLICTS" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

      - name: Create PR to develop
        if: steps.check.outputs.skip == 'false' && steps.backport_develop.outputs.success == 'true'
        id: create_pr_develop
        env:
          GH_TOKEN: ${{ secrets.WORKFLOW_TOKEN }}
        run: |
          PR_NUMBER="${{ steps.pr_info.outputs.number }}"
          PR_TITLE="${{ steps.pr_info.outputs.title }}"
          PR_URL="${{ steps.pr_info.outputs.url }}"
          PR_AUTHOR="${{ steps.pr_info.outputs.author }}"
          BRANCH="${{ steps.backport_develop.outputs.branch }}"

          BODY="## 🚨 Production Hotfix Backport

          This PR backports a production hotfix from \`main\` to \`develop\`.

          **Original PR:** [#${PR_NUMBER} - ${PR_TITLE}](${PR_URL})
          **Original Author:** @${PR_AUTHOR}

          ---

          ### ⚠️ Review Required

          **Please verify:**
          - [ ] Does this fix apply to develop?
          - [ ] Has the affected code been rewritten in develop?
          - [ ] Are there any conflicts with develop's changes?

          **Action options:**
          - ✅ **If applicable:** Approve and merge
          - ❌ **If not applicable:** Close with reason (e.g., feature removed in next release)
          - 🔧 **If needs changes:** Request modifications

          ---

          **Why this exists:**
          - Production hotfixes are merged directly to \`main\`
          - This backport keeps \`develop\` in sync with production fixes
          - Ensures ongoing development includes all production fixes

          **Note:** This PR was created automatically by the backport workflow."

          BACKPORT_PR_URL=$(gh pr create \
            --base develop \
            --head $BRANCH \
            --title "Backport (main→develop): $PR_TITLE" \
            --body "$BODY" \
            --label "backport" \
            --label "needs-review")

          BACKPORT_PR_NUMBER=$(echo "$BACKPORT_PR_URL" | grep -oP '\d+$')

          echo "pr_url=$BACKPORT_PR_URL" >> $GITHUB_OUTPUT
          echo "pr_number=$BACKPORT_PR_NUMBER" >> $GITHUB_OUTPUT
          echo "✅ Backport PR to develop created: #$BACKPORT_PR_NUMBER"

      # ========================================
      # NOTIFICATIONS
      # ========================================
      - name: Notify Slack on success
        if: |
          steps.check.outputs.skip == 'false' && 
          (steps.backport_release.outputs.success == 'true' || steps.backport_develop.outputs.success == 'true')
        run: |
          PR_NUMBER="${{ steps.pr_info.outputs.number }}"
          PR_TITLE="${{ steps.pr_info.outputs.title }}"
          PR_URL="${{ steps.pr_info.outputs.url }}"

          RELEASE_PR_URL="${{ steps.create_pr_release.outputs.pr_url }}"
          RELEASE_PR_NUMBER="${{ steps.create_pr_release.outputs.pr_number }}"

          DEVELOP_PR_URL="${{ steps.create_pr_develop.outputs.pr_url }}"
          DEVELOP_PR_NUMBER="${{ steps.create_pr_develop.outputs.pr_number }}"

          # Build backport PR links
          BACKPORT_LINKS=""
          if [ -n "$RELEASE_PR_URL" ]; then
            BACKPORT_LINKS="${BACKPORT_LINKS}\n  • <${RELEASE_PR_URL}|[main → release] #${RELEASE_PR_NUMBER}>"
          fi
          if [ -n "$DEVELOP_PR_URL" ]; then
            BACKPORT_LINKS="${BACKPORT_LINKS}\n  • <${DEVELOP_PR_URL}|[main → develop] #${DEVELOP_PR_NUMBER}>"
          fi

          MESSAGE=":arrows_counterclockwise: *Production Hotfix Backport*\n\n*Original PR:* <${PR_URL}|#${PR_NUMBER} - ${PR_TITLE}>\n\n*Backport PRs created:*${BACKPORT_LINKS}\n\n_Please review and merge backport PRs to keep branches in sync with production._"

          curl -X POST $SLACK_WEBHOOK_URL \
            -H 'Content-Type: application/json' \
            -d "{\"text\":\"$MESSAGE\"}"

      - name: Notify Slack on conflicts
        if: |
          steps.check.outputs.skip == 'false' && 
          (steps.backport_release.outputs.success == 'false' || steps.backport_develop.outputs.success == 'false')
        run: |
          PR_NUMBER="${{ steps.pr_info.outputs.number }}"
          PR_TITLE="${{ steps.pr_info.outputs.title }}"
          PR_URL="${{ steps.pr_info.outputs.url }}"

          CONFLICT_DETAILS=""

          if [ "${{ steps.backport_release.outputs.success }}" == "false" ]; then
            RELEASE_CONFLICTS="${{ steps.backport_release.outputs.conflicts }}"
            CONFLICT_DETAILS="${CONFLICT_DETAILS}\n\n*Release branch conflicts:*\n\`\`\`${RELEASE_CONFLICTS}\`\`\`"
          fi

          if [ "${{ steps.backport_develop.outputs.success }}" == "false" ]; then
            DEVELOP_CONFLICTS="${{ steps.backport_develop.outputs.conflicts }}"
            CONFLICT_DETAILS="${CONFLICT_DETAILS}\n\n*Develop branch conflicts:*\n\`\`\`${DEVELOP_CONFLICTS}\`\`\`"
          fi

          MESSAGE=":warning: *Backport Failed - Manual Resolution Needed*\n\n*Original PR:* <${PR_URL}|#${PR_NUMBER} - ${PR_TITLE}>\n*Reason:* Cherry-pick conflicts detected${CONFLICT_DETAILS}\n\n*Action required:*\n  1. Manually create branches from \`release\` and/or \`develop\`\n  2. Cherry-pick or manually apply changes\n  3. Resolve conflicts\n  4. Create PRs manually"

          curl -X POST $SLACK_WEBHOOK_URL \
            -H 'Content-Type: application/json' \
            -d "{\"text\":\"$MESSAGE\"}"
