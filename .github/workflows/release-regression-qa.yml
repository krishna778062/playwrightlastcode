name: QA Release Regression Tests

on:
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  check-stage:
    runs-on: [kubernetes]
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
      qa_tag: ${{ steps.get-tag.outputs.tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if QA stage is active
        id: check
        env:
          CURRENT_STAGE: ${{ vars.CURRENT_STAGE }}
        run: |
          STAGE=${CURRENT_STAGE:-qa}
          if [ "$STAGE" == "qa" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "✅ QA stage is active"
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
            echo "⏭️ Skipping (current stage: $STAGE)"
          fi

      - name: Get latest QA tag
        id: get-tag
        if: steps.check.outputs.should_run == 'true'
        run: |
          TAG=$(git ls-remote --tags origin | \
                grep -o 'refs/tags/.*-qa\.[0-9]*$' | \
                sort -V | tail -n1 | cut -d'/' -f3)

          if [ -z "$TAG" ]; then
            echo "tag=release" >> $GITHUB_OUTPUT
          else
            echo "tag=$TAG" >> $GITHUB_OUTPUT
            echo "✅ Will test: $TAG"
          fi

  regression:
    needs: check-stage
    if: needs.check-stage.outputs.should_run == 'true'
    uses: ./.github/workflows/regression-template.yml
    with:
      environment: qa
      git_ref: ${{ needs.check-stage.outputs.qa_tag }}
      slack_prefix: QA Regression
    secrets: inherit
