name: Auto Backport Release to Develop

on:
  pull_request:
    types: [closed]
    branches:
      - release

jobs:
  backport:
    if: github.event.pull_request.merged == true
    runs-on: [kubernetes]
    env:
      SLACK_WEBHOOK_URL: https://hooks.slack.com/services/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
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.WORKFLOW_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create backport branch and cherry-pick
        id: backport
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          PR_TITLE="${{ github.event.pull_request.title }}"
          PR_AUTHOR="${{ github.event.pull_request.user.login }}"
          MERGE_COMMIT="${{ github.event.pull_request.merge_commit_sha }}"

          echo "PR #$PR_NUMBER: $PR_TITLE"
          echo "Author: $PR_AUTHOR"
          echo "Merge commit: $MERGE_COMMIT"

          BACKPORT_BRANCH="backport/pr-${PR_NUMBER}-to-develop"
          git fetch origin develop
          git checkout -b $BACKPORT_BRANCH origin/develop

          echo "Created branch: $BACKPORT_BRANCH"

          if git cherry-pick -m 1 $MERGE_COMMIT; then
            echo "success=true" >> $GITHUB_OUTPUT
            echo "✅ Cherry-pick successful"
            
            git push origin $BACKPORT_BRANCH
            echo "branch=$BACKPORT_BRANCH" >> $GITHUB_OUTPUT
          else
            echo "success=false" >> $GITHUB_OUTPUT
            echo "❌ Cherry-pick failed - conflicts detected"
            
            git cherry-pick --abort
            
            CONFLICTS=$(git diff --name-only --diff-filter=U || echo "Unable to determine conflicts")
            echo "conflicts<<EOF" >> $GITHUB_OUTPUT
            echo "$CONFLICTS" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
          echo "pr_title=$PR_TITLE" >> $GITHUB_OUTPUT
          echo "pr_author=$PR_AUTHOR" >> $GITHUB_OUTPUT

      - name: Create backport PR
        id: create_pr
        if: steps.backport.outputs.success == 'true'
        env:
          GH_TOKEN: ${{ secrets.WORKFLOW_TOKEN }}
        run: |
          PR_NUMBER="${{ steps.backport.outputs.pr_number }}"
          PR_TITLE="${{ steps.backport.outputs.pr_title }}"
          PR_AUTHOR="${{ steps.backport.outputs.pr_author }}"
          BRANCH="${{ steps.backport.outputs.branch }}"

          BODY="**Automatic Backport**

          This PR backports changes from #${PR_NUMBER} to the develop branch.

          **Original PR:** #${PR_NUMBER}
          **Original Author:** @${PR_AUTHOR}
          **Original Title:** ${PR_TITLE}

          ---

          **Review Instructions:**
          - If changes are applicable to develop: Approve and merge
          - If changes are release-specific: Close this PR with a comment

          **Note:** This PR was created automatically by the backport workflow."

          BACKPORT_PR_URL=$(gh pr create \
            --base develop \
            --head $BRANCH \
            --title "Backport: $PR_TITLE" \
            --body "$BODY" \
            --assignee $PR_AUTHOR)

          echo "backport_pr_url=$BACKPORT_PR_URL" >> $GITHUB_OUTPUT
          echo "✅ Backport PR created: $BACKPORT_PR_URL"

      - name: Notify Slack on success
        if: steps.backport.outputs.success == 'true'
        run: |
          PR_NUMBER="${{ steps.backport.outputs.pr_number }}"
          PR_TITLE="${{ steps.backport.outputs.pr_title }}"
          ORIGINAL_PR_URL="${{ github.event.pull_request.html_url }}"
          BACKPORT_PR_URL="${{ steps.create_pr.outputs.backport_pr_url }}"

          MESSAGE="✅ *Backport PR Created*\n\n*Original PR:* <${ORIGINAL_PR_URL}|#${PR_NUMBER} - ${PR_TITLE}>\n\n*Backport PR:* <${BACKPORT_PR_URL}|View PR>\n\n_Please review and merge if applicable._"

          curl -X POST $SLACK_WEBHOOK_URL \
            -H 'Content-Type: application/json' \
            -d "{\"text\":\"$MESSAGE\"}"

      - name: Notify Slack on conflict
        if: steps.backport.outputs.success == 'false'
        run: |
          PR_NUMBER="${{ steps.backport.outputs.pr_number }}"
          PR_TITLE="${{ steps.backport.outputs.pr_title }}"
          ORIGINAL_PR_URL="${{ github.event.pull_request.html_url }}"

          MESSAGE="⚠️ *Backport Failed - Manual Intervention Needed*\n\n*Original PR:* <${ORIGINAL_PR_URL}|#${PR_NUMBER} - ${PR_TITLE}>\n\n*Reason:* Cherry-pick conflicts detected\n\n*Action Required:*\n1. Manually create a branch from develop\n2. Cherry-pick or manually apply changes\n3. Resolve conflicts\n4. Create PR to develop"

          curl -X POST $SLACK_WEBHOOK_URL \
            -H 'Content-Type: application/json' \
            -d "{\"text\":\"$MESSAGE\"}"
