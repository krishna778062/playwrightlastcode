name: Auto Backport Release to Develop

on:
  pull_request:
    types: [closed]
    branches:
      - release

jobs:
  backport:
    if: github.event.pull_request.merged == true
    runs-on: [kubernetes]
    env:
      SLACK_WEBHOOK_URL: https://hooks.slack.com/services/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
    steps:
      - name: Check if backport is needed
        id: should_run
        run: |
          SOURCE_BRANCH="${{ github.event.pull_request.head.ref }}"

          # Skip if PR is from develop (those changes already exist in develop)
          if [ "$SOURCE_BRANCH" == "develop" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "⏭️ Skipping - PR is from develop branch (no backport needed)"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "✅ PR is from '$SOURCE_BRANCH' - will check for backport"
          fi

      - name: Checkout repository
        if: steps.should_run.outputs.skip == 'false'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.WORKFLOW_TOKEN }}

      - name: Check for existing sync PR
        if: steps.should_run.outputs.skip == 'false'
        id: check_pr
        env:
          GH_TOKEN: ${{ secrets.WORKFLOW_TOKEN }}
        run: |
          # Look for existing open PR from release to develop
          EXISTING_PR=$(gh pr list \
            --base develop \
            --head release \
            --state open \
            --json number,url \
            --jq 'if length > 0 then .[0] | "\(.number) \(.url)" else "" end' 2>/dev/null || echo "")

          if [ -n "$EXISTING_PR" ] && [ "$EXISTING_PR" != "null null" ]; then
            PR_NUMBER=$(echo "$EXISTING_PR" | cut -d' ' -f1)
            PR_URL=$(echo "$EXISTING_PR" | cut -d' ' -f2)
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
            echo "pr_url=$PR_URL" >> $GITHUB_OUTPUT
            echo "✅ Found existing sync PR: #$PR_NUMBER"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "📝 No existing sync PR found - will create one"
          fi

      - name: Create sync PR if not exists
        id: create_pr
        if: steps.should_run.outputs.skip == 'false' && steps.check_pr.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.WORKFLOW_TOKEN }}
        run: |
          # Check if there are differences between release and develop
          git fetch origin develop release

          DIFF_COUNT=$(git rev-list --count origin/develop..origin/release)

          if [ "$DIFF_COUNT" -eq 0 ]; then
            echo "created=false" >> $GITHUB_OUTPUT
            echo "⏭️ No differences between release and develop - skipping PR creation"
            exit 0
          fi

          echo "Found $DIFF_COUNT commits to sync"

          # Get info about the triggering PR
          ORIGINAL_PR_NUMBER="${{ github.event.pull_request.number }}"
          ORIGINAL_PR_TITLE="${{ github.event.pull_request.title }}"
          ORIGINAL_PR_URL="${{ github.event.pull_request.html_url }}"
          ORIGINAL_PR_AUTHOR="${{ github.event.pull_request.user.login }}"
          CURRENT_DATE=$(date +"%b %d, %Y")

          # Create PR body using heredoc
          PR_BODY=$(cat <<EOF
          ## 🔄 Sync: release → develop

          This PR keeps the \`develop\` branch in sync with \`release\`.

          ### 📋 Changes Included:

          | PR | Title | Author | Added |
          |----|-------|--------|-------|
          | [#${ORIGINAL_PR_NUMBER}](${ORIGINAL_PR_URL}) | ${ORIGINAL_PR_TITLE} | @${ORIGINAL_PR_AUTHOR} | ${CURRENT_DATE} |

          ### How it works:
          - This PR **auto-updates** as more changes land on \`release\`
          - **Merge this PR** periodically to keep \`develop\` up to date
          - New changes will be added to the table above

          ⚠️ **Note:** Do not close this PR - it will be reused for future syncs.
          EOF
          )

          # Create the sync PR
          SYNC_PR_URL=$(gh pr create \
            --base develop \
            --head release \
            --title "🔄 Sync: release → develop" \
            --body "$PR_BODY")

          echo "created=true" >> $GITHUB_OUTPUT
          echo "pr_url=$SYNC_PR_URL" >> $GITHUB_OUTPUT

          # Extract PR number from URL
          PR_NUMBER=$(echo "$SYNC_PR_URL" | grep -oP '\d+$')
          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT

          echo "✅ Created sync PR: $SYNC_PR_URL"

      - name: Update existing PR body with new change
        if: steps.should_run.outputs.skip == 'false' && steps.check_pr.outputs.exists == 'true'
        env:
          GH_TOKEN: ${{ secrets.WORKFLOW_TOKEN }}
        run: |
          SYNC_PR_NUMBER="${{ steps.check_pr.outputs.pr_number }}"
          ORIGINAL_PR_NUMBER="${{ github.event.pull_request.number }}"
          ORIGINAL_PR_TITLE="${{ github.event.pull_request.title }}"
          ORIGINAL_PR_URL="${{ github.event.pull_request.html_url }}"
          ORIGINAL_PR_AUTHOR="${{ github.event.pull_request.user.login }}"
          CURRENT_DATE=$(date +"%b %d, %Y")

          # Get current PR body
          CURRENT_BODY=$(gh pr view $SYNC_PR_NUMBER --json body --jq '.body')

          # Create new table row
          NEW_ROW="| [#${ORIGINAL_PR_NUMBER}](${ORIGINAL_PR_URL}) | ${ORIGINAL_PR_TITLE} | @${ORIGINAL_PR_AUTHOR} | ${CURRENT_DATE} |"

          # Insert new row after the table header (after the |----| line)
          UPDATED_BODY=$(echo "$CURRENT_BODY" | awk -v new_row="$NEW_ROW" '
            /^\|-+\|-+\|-+\|-+\|$/ { 
              print; 
              print new_row; 
              next 
            }
            { print }
          ')

          # Update the PR body
          gh pr edit $SYNC_PR_NUMBER --body "$UPDATED_BODY"

          # Also add a comment for notification
          COMMENT_BODY=$(cat <<EOF
          ### 📥 New changes added

          **From PR:** [#${ORIGINAL_PR_NUMBER} - ${ORIGINAL_PR_TITLE}](${ORIGINAL_PR_URL})
          **Author:** @${ORIGINAL_PR_AUTHOR}

          _The PR description has been updated with this change._
          EOF
          )

          gh pr comment $SYNC_PR_NUMBER --body "$COMMENT_BODY"

          echo "✅ Updated sync PR #$SYNC_PR_NUMBER with new change"

      - name: Determine PR URL for notification
        if: steps.should_run.outputs.skip == 'false'
        id: pr_info
        run: |
          if [ "${{ steps.check_pr.outputs.exists }}" == "true" ]; then
            echo "pr_url=${{ steps.check_pr.outputs.pr_url }}" >> $GITHUB_OUTPUT
            echo "pr_number=${{ steps.check_pr.outputs.pr_number }}" >> $GITHUB_OUTPUT
            echo "is_new=false" >> $GITHUB_OUTPUT
          elif [ "${{ steps.create_pr.outputs.created }}" == "true" ]; then
            echo "pr_url=${{ steps.create_pr.outputs.pr_url }}" >> $GITHUB_OUTPUT
            echo "pr_number=${{ steps.create_pr.outputs.pr_number }}" >> $GITHUB_OUTPUT
            echo "is_new=true" >> $GITHUB_OUTPUT
          else
            echo "pr_url=" >> $GITHUB_OUTPUT
            echo "is_new=skip" >> $GITHUB_OUTPUT
          fi

      - name: Notify Slack
        if: steps.should_run.outputs.skip == 'false' && steps.pr_info.outputs.pr_url != ''
        run: |
          ORIGINAL_PR_NUMBER="${{ github.event.pull_request.number }}"
          ORIGINAL_PR_TITLE="${{ github.event.pull_request.title }}"
          ORIGINAL_PR_URL="${{ github.event.pull_request.html_url }}"
          SYNC_PR_URL="${{ steps.pr_info.outputs.pr_url }}"
          SYNC_PR_NUMBER="${{ steps.pr_info.outputs.pr_number }}"
          IS_NEW="${{ steps.pr_info.outputs.is_new }}"

          if [ "$IS_NEW" == "true" ]; then
            MESSAGE="🔄 *Sync PR Created [release → develop]*\n\n*Triggered by:* <${ORIGINAL_PR_URL}|#${ORIGINAL_PR_NUMBER} - ${ORIGINAL_PR_TITLE}>\n\n*Sync PR:* <${SYNC_PR_URL}|#${SYNC_PR_NUMBER}>\n\n_A new sync PR has been created. Review and merge to keep develop in sync._"
          else
            MESSAGE="📥 *Changes Added to Sync PR [release → develop]*\n\n*New changes from:* <${ORIGINAL_PR_URL}|#${ORIGINAL_PR_NUMBER} - ${ORIGINAL_PR_TITLE}>\n\n*Sync PR:* <${SYNC_PR_URL}|#${SYNC_PR_NUMBER}>\n\n_The sync PR description has been updated with the new changes._"
          fi

          curl -X POST $SLACK_WEBHOOK_URL \
            -H 'Content-Type: application/json' \
            -d "{\"text\":\"$MESSAGE\"}"
