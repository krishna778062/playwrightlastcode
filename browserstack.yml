# =============================
# Set BrowserStack Credentials
# =============================
# Use environment variables for sensitive data (set in CI secrets)
userName: ${BROWSERSTACK_USERNAME:-prateekparashar_LlOEnN}
accessKey: ${BROWSERSTACK_ACCESS_KEY:-sycBfgWLQZUZQJ8W86gb}

# ======================
# BrowserStack Reporting
# ======================
# Dynamic build/project names from CI environment
buildName: '${MODULE_NAME:-Automation} Tests - ${TEST_ENV:-qa}'
projectName: '${MODULE_NAME:-Automation}'
buildIdentifier: '#${BUILD_NUMBER:-local}'

# Custom tags for filtering (useful in BrowserStack dashboard)
CUSTOM_TAG_1: '${MODULE_NAME:-automation}'
CUSTOM_TAG_2: '${TEST_ENV:-qa}'
CUSTOM_TAG_3: '${CI_BRANCH:-local}'

# ======================
# Test Observability Only
# ======================
# Run tests locally, report to BrowserStack
testObservability: true
browserstackAutomation: false # Tests run locally, NOT on BrowserStack browsers

# ===================
# Debugging features
# ===================
debug: ${BROWSERSTACK_DEBUG:-false}
networkLogs: true
consoleLogs: errors
